<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--bg2:#0D0D18;--bg3:#12121F;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.12);
  --blue:#4F8EF7;--blue2:#2563EB;--green:#34D399;--amber:#F59E0B;--red:#EF4444;--pink:#EC4899;--purple:#A78BFA;
  --txt:#F0F0FA;--txt2:#9191B4;--txt3:#4A4A6A;
  --ff:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--ff)}
*{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
a{color:inherit;text-decoration:none}
input,textarea,button,select{font-family:inherit}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 0 rgba(79,142,247,0)}50%{box-shadow:0 0 30px rgba(79,142,247,.2)}}
@keyframes nuke{0%,100%{box-shadow:0 0 30px rgba(239,68,68,.4),0 0 60px rgba(239,68,68,.15)}50%{box-shadow:0 0 80px rgba(239,68,68,.8),0 0 150px rgba(239,68,68,.3)}}
@keyframes cfFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes gridMove{0%{transform:translateY(0)}100%{transform:translateY(40px)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}

#app{min-height:100vh;display:flex;flex-direction:column}
.dash{height:100vh;display:flex;overflow:hidden}
.sb{width:224px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;height:100vh;position:sticky;top:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:56px;background:rgba(8,8,16,.95);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;backdrop-filter:blur(20px)}
.content{flex:1;overflow:auto;padding:28px 24px}

.glass{background:rgba(255,255,255,.025);border:1px solid var(--bd);border-radius:14px}
.btn{border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:13px;padding:11px 22px;transition:all .15s;letter-spacing:.3px;font-family:var(--ff);outline:none}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:none}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;box-shadow:0 4px 20px rgba(79,142,247,.3)}
.btn-primary:hover{box-shadow:0 8px 30px rgba(79,142,247,.5)}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--txt2);border:1px solid var(--bd)}
.btn-ghost:hover{background:rgba(255,255,255,.08);color:var(--txt)}
.btn-success{background:linear-gradient(135deg,#34D399,#059669);color:#fff}
.btn-sm{padding:8px 14px;font-size:12px}
.btn-lg{padding:16px 44px;font-size:16px;letter-spacing:.5px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:1px;font-family:var(--mono)}
.nav-btn{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;border:none;cursor:pointer;background:transparent;color:var(--txt2);font-weight:600;font-size:13px;transition:all .15s;text-align:left;width:100%;font-family:var(--ff)}
.nav-btn:hover{background:rgba(255,255,255,.05);color:var(--txt)}
.nav-btn.active{background:rgba(79,142,247,.12);color:var(--blue);font-weight:800}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(16px);animation:fadeIn .2s ease}
.modal{background:var(--bg2);border:1px solid rgba(79,142,247,.3);border-radius:24px;width:100%;max-width:900px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 0 120px rgba(79,142,247,.1)}

.prog-wrap{height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.prog-bar{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.task-card{padding:18px 22px;transition:all .3s;cursor:default;border-radius:14px}
.task-card.active-card{animation:glow 3s ease-in-out infinite}
.cf{position:fixed;top:-12px;pointer-events:none;animation:cfFall linear forwards;z-index:9999}
.spinner{border-radius:50%;animation:spin .7s linear infinite}
textarea{resize:none;outline:none;background:transparent;border:none;color:var(--txt2);font-size:14px;line-height:1.8;padding:20px;width:100%;font-family:var(--mono)}
.field{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:12px;padding:15px 18px;font-size:14px;color:var(--txt);outline:none;transition:border-color .2s;font-family:var(--ff)}
.field:focus{border-color:var(--blue)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-res{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px}
.bg-grid{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.bg-grid::before{content:'';position:absolute;inset:-40px;background-image:linear-gradient(rgba(79,142,247,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,.05) 1px,transparent 1px);background-size:40px 40px;animation:gridMove 8s linear infinite}
.bg-glow{position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(79,142,247,.07) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-60%);pointer-events:none}
pre{white-space:pre-wrap;word-break:break-word}

/* Category filter pills */
.cat-pill{padding:6px 14px;border-radius:20px;border:1px solid var(--bd);background:rgba(255,255,255,.03);color:var(--txt2);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;font-family:var(--mono);letter-spacing:.5px;white-space:nowrap}
.cat-pill:hover{background:rgba(79,142,247,.08);border-color:rgba(79,142,247,.3);color:var(--blue)}
.cat-pill.active{background:rgba(79,142,247,.15);border-color:var(--blue);color:var(--blue)}
.cat-pills-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}

/* Idea result card */
.idea-card{background:rgba(255,255,255,.025);border:1px solid var(--bd);border-radius:14px;padding:20px;transition:all .2s;cursor:default}
.idea-card:hover{border-color:rgba(79,142,247,.35);background:rgba(79,142,247,.04)}
.ideas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}

    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:CLAUDE_MODEL,max_tokens:1000,system:sys||"You are an elite business strategist. Be concise and actionable.",messages:[{role:"user",content:prompt}]})

  }catch(e){return "Connection error. Please retry.";}
}

// ── DOM HELPER ────────────────────────────────────────────
function el(tag,attrs,...ch){
  const e=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==="class") e.className=v;
    else if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  ch.flat().forEach(c=>{if(c==null)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return e;
}

// ── CONFETTI ──────────────────────────────────────────────
function confetti(){
  const cls=["#4F8EF7","#34D399","#F59E0B","#EC4899","#A78BFA","#FCD34D"];
  for(let i=0;i<100;i++) setTimeout(()=>{
    const d=document.createElement("div");d.className="cf";
    d.style.cssText=`left:${Math.random()*100}vw;width:${5+Math.random()*9}px;height:${5+Math.random()*9}px;background:${cls[~~(Math.random()*cls.length)]};border-radius:${Math.random()>.5?"50%":"2px"};animation-duration:${1.5+Math.random()*2}s;transform:rotate(${Math.random()*360}deg)`;
    document.body.appendChild(d);setTimeout(()=>d.remove(),4000);
  },i*25);
}

// ── COPY HELPER ───────────────────────────────────────────
function copyText(text,btn){
  const doCopy=()=>{
    const ta=document.createElement("textarea");ta.value=text;ta.style.cssText="position:fixed;opacity:0";
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand("copy");}catch(e){}
    document.body.removeChild(ta);
    if(btn){const o=btn.innerHTML;btn.innerHTML="✓ Copied!";btn.style.background="#059669";setTimeout(()=>{btn.innerHTML=o;btn.style.background="";},2000);}
  };
  if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>{if(btn){const o=btn.innerHTML;btn.innerHTML="✓ Copied!";btn.style.background="#059669";setTimeout(()=>{btn.innerHTML=o;btn.style.background="";},2000);}}).catch(doCopy);
  else doCopy();
}

// ── MINI PIE ──────────────────────────────────────────────
function pie(p,col,sz=60){
  const r=sz/2-6,cx=sz/2,cy=sz/2,a=(p/100)*2*Math.PI;
  const x2=cx+r*Math.sin(a),y2=cy-r*Math.cos(a),lg=a>Math.PI?1:0,ir=r-10;
  const pd=p>=99?`M${cx} ${cy-r}A${r} ${r} 0 1 1 ${cx-.01} ${cy-r}ZM${cx} ${cy-ir}A${ir} ${ir} 0 1 0 ${cx-.01} ${cy-ir}Z`:p<=0?"":
    `M${cx} ${cy-r}A${r} ${r} 0 ${lg} 1 ${x2} ${y2}L${cx+ir*Math.sin(a)} ${cy-ir*Math.cos(a)}A${ir} ${ir} 0 ${lg} 0 ${cx} ${cy-ir}Z`;
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="10"/>${p>0?`<path d="${pd}" fill="${col}" opacity=".9"/>`:''}<text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="11" font-weight="700" fill="${col}" font-family="DM Mono,monospace">${p}%</text></svg>`;
}

  const PROMPTS={
    reddit:`Elite Reddit copywriter. Write a viral Reddit post for: "${n}" (${u})\n\nTITLE: [curiosity-gap title]\n\nPOST BODY (300 words):\n- Relatable story or shocking stat opener\n- Describe the problem vividly\n- Share what you built (don't oversell)\n- 3-4 genuine value tips\n- Soft solution mention at end\n- Question to drive comments\n\nBEST SUBREDDITS: [4 relevant ones]`,
    twitter:`Write viral 8-tweet thread for: "${n}" (${u})\n\nFormat each:\n1/ [HOOK — bold claim or shocking stat]\n2/ [Problem setup]\n3/ [Pain amplification with numbers]\n4/ [Key insight most miss]\n5/ [Tip 1 — actionable]\n6/ [Tip 2 or case study]\n7/ [Solution reveal]\n8/ [CTA + question]\n\nEach under 280 chars.`,
    cold_dm:`3 cold DM versions for: "${n}" (${u})\n\nVERSION 1 — ULTRA SHORT (50 words max):\n[write it]\n\nVERSION 2 — MEDIUM (100 words):\n[write it]\n\nVERSION 3 — STORY (200 words):\n[write it]\n\nFOLLOW-UP (day 3):\n[write exact line]`,
    linkedin:`Viral LinkedIn post for: "${n}" (${u})\n\nLINE 1: [Bold hook]\n\n[2-3 sentence expansion]\n\n[Body: 4-5 short paragraphs — problem, insight, solution]\n\n[CTA — question + link in comments]\n\nHASHTAGS: [5]\nBEST TIME TO POST: [day + time]`,
    email:`Complete launch email for: "${n}" (${u})\n\nSUBJECT A: [curiosity]\nSUBJECT B: [benefit]\nPREVIEW TEXT: [30 chars]\n\nHi [First Name],\n\n[HOOK — story or stat]\n[PROBLEM — their words]\n[BRIDGE — that's why I built...]\n[SOLUTION — specific outcome]\n\nWhat you get:\n• [Deliverable 1]\n• [Deliverable 2]\n• [Deliverable 3]\n\n[CTA BUTTON TEXT]\n\n[Objection handler]\n\nTalk soon,\n[Name]\n\nP.S. [urgency or bonus]\n\n---\nFOLLOW-UP (day 3):\nSubject: [write]\nBody: [3-4 sentences]`,
  };

  S.scriptOuts[type]=result;S.scriptLoading[type]=false;render();

// ── QA / RESULTS HTML ─────────────────────────────────────
function renderQAHTML(){
  const step=S.qaStep;
  const isResults=step>=QUESTIONS.length&&S.qaIdeas.length>0;

  if(S.qaLoading) return`<div style="text-align:center;padding:80px 0"><div class="spinner" style="width:52px;height:52px;border:4px solid rgba(79,142,247,.15);border-top-color:var(--blue);margin:0 auto 20px"></div><div style="font-size:20px;font-weight:700;margin-bottom:8px">Analyzing Your Profile...</div><div style="color:var(--txt3);font-size:13px;font-family:var(--mono)">Scanning 225 ideas across 9 categories</div></div>`;

  if(isResults){
    // Category filter pills for results
    const catCounts={};
    S.qaIdeas.forEach(i=>{catCounts[i.cat||(i.category||"Other")]=(catCounts[i.cat||(i.category||"Other")]||0)+1;});
    const allCats=["All",...Object.keys(catCounts)];

    const pills=allCats.map(c=>`<button class="cat-pill${S.activeCat===c?" active":""}" data-cat="${c}">${c==="All"?"All ("+S.qaIdeas.length+")":c+" ("+catCounts[c]+")"}</button>`).join("");

    const displayIdeas=S.activeCat==="All"?S.qaIdeas:S.qaIdeas.filter(i=>(i.cat||i.category)===S.activeCat);

    const cards=displayIdeas.map((idea,i)=>{
      const diff=parseInt(idea.diff||idea.difficulty)||3;
      const diffC={1:"#34D399",2:"#34D399",3:"#F59E0B",4:"#EF4444",5:"#EF4444"}[diff];
      const catKey=idea.cat||idea.category||"";
      const catCol=CAT_COLORS[catKey]||"var(--blue)";
      // Store full idea in global map so onclick can retrieve it by key
      const ideaKey = idea.id || ('idea_'+i);
      window.__ideaMap = window.__ideaMap || {};
      window.__ideaMap[ideaKey] = idea;
      return`<div class="idea-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><span style="background:${catCol}18;border:1px solid ${catCol}40;color:${catCol};font-size:9px;font-weight:700;padding:3px 9px;border-radius:5px;font-family:var(--mono)">${(idea.cs||catKey).toUpperCase()}</span><span style="font-size:15px;font-weight:800;color:var(--green);font-family:var(--mono)">${idea.confidence_score||idea.conf||80}%</span></div><div style="font-size:14px;font-weight:700;margin-bottom:5px;line-height:1.4">${idea.name||idea.idea_name}</div><div style="font-size:12px;color:var(--txt3);margin-bottom:14px;line-height:1.6">${idea.usp}</div><div style="display:flex;flex-direction:column;gap:5px;margin-bottom:16px"><div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:var(--txt3);font-family:var(--mono)">DIFFICULTY</span><div style="display:flex;gap:2px">${[1,2,3,4,5].map(d=>`<div style="width:8px;height:8px;border-radius:2px;background:${d<=diff?diffC:"rgba(255,255,255,.1)"}"></div>`).join("")}</div></div><div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:var(--txt3);font-family:var(--mono)">LAUNCH SPEED</span><span style="font-size:10px;color:var(--amber);font-weight:700;font-family:var(--mono)">7 HOURS</span></div></div><button class="btn btn-primary" onclick="pickIdeaByKey('${ideaKey}')" style="width:100%;font-size:14px;border:none;border-radius:10px;padding:12px;cursor:pointer;background:linear-gradient(135deg,#4F8EF7,#2563EB);color:#fff;font-weight:700;font-family:inherit">🚀 Start Execution</button></div>`;
    }).join("");

    return`<div style="margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"><span style="font-size:12px;color:var(--green);font-weight:700;font-family:var(--mono)">✨ ${S.qaIdeas.length} IDEAS MATCHED — TOP 20 BY CONFIDENCE</span><button class="btn btn-ghost btn-sm" id="refine-btn">🔄 Refine Search</button></div><div class="cat-pills-wrap">${pills}</div><div class="ideas-grid">${cards}</div>`;
  }

  // Question flow
  const q=QUESTIONS[step]||QUESTIONS[0];
  const bars=QUESTIONS.map((_,i)=>`<div style="flex:1;height:3px;border-radius:2px;background:${i<=step?"var(--blue)":"rgba(255,255,255,.07)"}"></div>`).join("");
  const sel=S.qaAnswers[step]||"";
  const opts=q.opts.map(opt=>{
    const isSel=opt===sel;
    const sv=opt.replace(/'/g,"\\'").replace(/"/g,"&quot;");
    return`<button class="qa-opt" data-val="${opt}" onclick="selectOpt('${sv}')" style="padding:14px 16px;border-radius:11px;width:100%;border:2px solid ${isSel?"var(--blue)":"rgba(255,255,255,.08)"};background:${isSel?"rgba(79,142,247,.1)":"rgba(255,255,255,.03)"};color:${isSel?"var(--blue)":"var(--txt2)"};font-size:13px;font-weight:${isSel?"700":"500"};cursor:pointer;text-align:left;transition:all .15s;font-family:var(--ff);display:flex;align-items:center;gap:10px"><span style="width:16px;height:16px;border-radius:50%;flex-shrink:0;border:2px solid ${isSel?"var(--blue)":"rgba(255,255,255,.2)"};background:${isSel?"var(--blue)":"transparent"};display:flex;align-items:center;justify-content:center">${isSel?'<span style="width:6px;height:6px;border-radius:50%;background:#fff;display:block"></span>':""}</span>${opt}</button>`;
  }).join("");

  return`<div style="animation:fadeUp .3s ease"><div style="display:flex;gap:6px;margin-bottom:28px">${bars}</div><div style="font-size:11px;color:var(--blue);font-weight:700;margin-bottom:10px;font-family:var(--mono)">QUESTION ${step+1} OF ${QUESTIONS.length}</div><div style="display:flex;align-items:center;gap:12px;margin-bottom:22px"><span style="font-size:28px">${q.icon}</span><div style="font-size:20px;font-weight:700;letter-spacing:-.3px">${q.q}</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px">${opts}</div><div style="display:flex;justify-content:space-between;align-items:center"><button class="btn btn-ghost" id="qa-back" ${step===0?"disabled":""}>← Back</button><div style="display:flex;align-items:center;gap:10px">${!sel?'<span style="font-size:12px;color:var(--txt3);font-family:var(--mono)">Pick one to continue</span>':"" }<button id="qa-next" class="btn btn-primary" ${!sel?"disabled":""} style="opacity:${sel?"1":".4"}">${step===QUESTIONS.length-1?"✨ Match My Ideas":"Next →"}</button></div></div></div>`;
}
window.renderQAHTML=renderQAHTML;

function bindModalBody(){

}
window.bindModalBody=bindModalBody;

function refreshMB(){const mb=document.getElementById("modal-body");if(mb){mb.innerHTML=renderQAHTML();bindModalBody();}}
window.refreshMB=refreshMB;

function selectOpt(val){
  S.qaAnswers[S.qaStep]=val;
  document.querySelectorAll(".qa-opt").forEach(b=>{
    const isSel=b.dataset.val===val;
    b.style.borderColor=isSel?"var(--blue)":"rgba(255,255,255,.08)";
    b.style.background=isSel?"rgba(79,142,247,.1)":"rgba(255,255,255,.03)";
    b.style.color=isSel?"var(--blue)":"var(--txt2)";
    b.style.fontWeight=isSel?"700":"500";
    const dot=b.querySelector("span");
    if(dot){dot.style.borderColor=isSel?"var(--blue)":"rgba(255,255,255,.2)";dot.style.background=isSel?"var(--blue)":"transparent";const inner=dot.querySelector("span");if(inner)inner.style.display=isSel?"block":"none";}
  });
  const nb=document.getElementById("qa-next");if(nb){nb.disabled=false;nb.style.opacity="1";}
  const hint=document.querySelector("#modal-body .qa-hint");if(hint)hint.style.display="none";
}
window.selectOpt=selectOpt;

async function qaNext(){
  const val=S.qaAnswers[S.qaStep]||"";if(!val)return;
  if(S.qaStep<QUESTIONS.length-1){S.qaStep++;refreshMB();return;}
  // Last step — find ideas via GAS → fallback to local
  S.qaLoading=true;refreshMB();
  try{
    const data=await gasPost({action:"filterTop20",userProfile:{skillset:S.qaAnswers[0],audience:S.qaAnswers[1],format:S.qaAnswers[2],time:S.qaAnswers[3],revenue:S.qaAnswers[4]}});
    if(data?.top20?.length>=5){
      // Enrich with local IDEAS data if needed
      S.qaIdeas=data.top20.map(r=>{
        const local=IDEAS.find(i=>i.id===r.id);
        if(local) return{...local,...r,name:r.idea_name||r.name||local.name,cat:r.category||local.cat,cs:r.cat_short||local.cs};
        return r;
      });
    } else throw new Error("insufficient results");
  }catch{
    // Smart local scoring fallback
    const skill=(S.qaAnswers[0]||"").toLowerCase();
    const audience=(S.qaAnswers[1]||"").toLowerCase();
    const fmt=(S.qaAnswers[2]||"").toLowerCase();
    const scored=IDEAS.map(idea=>{
      let sc=Math.floor(Math.random()*15)+60;
      if((skill.includes("cod")||skill.includes("tech"))&&idea.cat==="B2B SaaS") sc+=28;
      if((skill.includes("writ")||skill.includes("copy"))&&(idea.cat==="High-Ticket Digital Services"||idea.cat==="Micro-Niche Content")) sc+=28;
      if((skill.includes("financ")||skill.includes("consult"))&&idea.cat==="Real Estate & Finance") sc+=28;
      if((skill.includes("sales")||skill.includes("market"))&&(idea.cat==="Agency & Consulting"||idea.cat==="High-Ticket Digital Services")) sc+=24;
      if((skill.includes("video")||skill.includes("design"))&&(idea.cat==="Creator Economy"||idea.cat==="High-Ticket Digital Services")) sc+=24;
      if(audience.includes("ecommerce")&&idea.cat==="Ecommerce AI") sc+=26;
      if((audience.includes("local")||audience.includes("small"))&&idea.cat==="Local Business AI") sc+=26;
      if((audience.includes("creator")||audience.includes("coach"))&&idea.cat==="Creator Economy") sc+=24;
      if((audience.includes("agency")||audience.includes("consult"))&&idea.cat==="Agency & Consulting") sc+=24;
      if(audience.includes("real estate")&&idea.cat==="Real Estate & Finance") sc+=24;
      if((audience.includes("saas")||audience.includes("startup"))&&idea.cat==="B2B SaaS") sc+=24;
      if(fmt.includes("newsletter")&&idea.cat==="Micro-Niche Content") sc+=22;
      if((fmt.includes("service")||fmt.includes("done"))&&idea.cat==="High-Ticket Digital Services") sc+=22;
      if((fmt.includes("saas")||fmt.includes("software"))&&idea.cat==="B2B SaaS") sc+=22;
      if(fmt.includes("agency")&&idea.cat==="Agency & Consulting") sc+=22;
      if(fmt.includes("content")&&(idea.cat==="Creator Economy"||idea.cat==="Micro-Niche Content")) sc+=20;
      return{...idea,confidence_score:Math.min(sc,98),conf:Math.min(sc,98)+"%"};
    });
    scored.sort((a,b)=>b.confidence_score-a.confidence_score);
    S.qaIdeas=scored.slice(0,20);
  }
  S.qaLoading=false;S.qaStep=QUESTIONS.length;refreshMB();
}
window.qaNext=qaNext;

function pickIdea(idx){
  const idea=S.qaIdeas[idx];if(!idea){console.error("pickIdea: no idea at idx",idx);return;}
  pickIdeaObj(idea);
}
window.pickIdea=pickIdea;

function pickIdeaById(ideaId){
  // First search in qaIdeas results
  let idea=S.qaIdeas.find(i=>i.id===ideaId||(i.id||"")===ideaId);
  // Fallback to IDEAS master list
  if(!idea) idea=IDEAS.find(i=>i.id===ideaId);
  if(!idea){console.error("pickIdeaById: cannot find",ideaId,"in",S.qaIdeas.length,"results");return;}
  pickIdeaObj(idea);
}
window.pickIdeaById=pickIdeaById;

function pickIdeaObj(idea){
  S.idea={
    id:idea.id,
    name:idea.name||idea.idea_name||"Unnamed",
    cat:idea.cat||idea.category||"",
    cs:idea.cs||idea.cat_short||"",
    usp:idea.usp||"",
    diff:idea.diff||idea.difficulty||3
  };
  S.modalOpen=false;S.qaStep=0;S.qaAnswers={};S.qaIdeas=[];S.qaLoading=false;
  S.page="dashboard";S.tab="launch";
  gasPost({action:"populateRoadmap",ideaId:idea.id});
  render();
}
window.pickIdeaObj=pickIdeaObj;

function pickIdeaByKey(key){
  // Get idea from global map (most reliable - stored at render time)
  const idea = (window.__ideaMap && window.__ideaMap[key]);
  if(idea){ pickIdeaObj(idea); return; }
  // Fallback: search qaIdeas then master IDEAS
  const fromQA = S.qaIdeas.find(i=>(i.id||'')===key);
  if(fromQA){ pickIdeaObj(fromQA); return; }
  const fromMaster = IDEAS.find(i=>i.id===key);
  if(fromMaster){ pickIdeaObj(fromMaster); return; }
  console.error('pickIdeaByKey: not found:', key);
}
window.pickIdeaByKey=pickIdeaByKey;

  const div=el("div",{id:"app",style:{minHeight:"100vh",display:"flex",flexDirection:"column",background:"var(--bg)",position:"relative",overflow:"hidden"}});
  div.appendChild(el("div",{class:"bg-grid"}));
  div.appendChild(el("div",{class:"bg-glow"}));
  const ob=el("div",{style:{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"40px",position:"relative",zIndex:1}});
  ob.innerHTML=`<div style="text-align:center;max-width:600px;animation:fadeUp .7s ease">
    <div style="display:inline-flex;align-items:center;gap:8px;background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.3);border-radius:20px;padding:6px 18px;margin-bottom:24px"><span style="font-size:11px;color:var(--blue);font-weight:700;font-family:var(--mono)">⚡ AI BUSINESS LAUNCH SYSTEM</span></div>
    <h1 style="font-size:56px;font-weight:800;margin-bottom:14px;letter-spacing:-2.5px;line-height:1.05">Execution<br><span style="background:linear-gradient(135deg,var(--blue),#7C3AED);-webkit-background-clip:text;-webkit-text-fill-color:transparent">OS</span></h1>
    <p style="font-size:16px;color:var(--txt2);line-height:1.7;margin-bottom:36px"><strong style="color:var(--txt)">225 premium AI business ideas</strong> across 9 categories.<br>AI matches you to your top 20. Launch in 7 hours.</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:32px">
      <button class="btn btn-primary btn-lg" id="home-find">✨ Find My Perfect Idea</button>
      <button class="btn btn-ghost btn-lg" id="home-demo">View Demo →</button>
    </div>
    <div style="display:flex;gap:24px;justify-content:center;flex-wrap:wrap">
      ${["225 Premium Ideas","9 Categories","7-Hour Launch","30-Day Scaling","AI Scripts"].map(f=>`<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3);font-family:var(--mono)"><div style="width:5px;height:5px;border-radius:50%;background:var(--blue)"></div>${f}</div>`).join("")}
    </div>
  </div>`;
  div.appendChild(ob);
  return div;
}

// ── MAIN RENDER ───────────────────────────────────────────
function render(){
  const app=document.getElementById("app");if(!app)return;

  if(S.page==="home"){
    const nw=renderHome();app.replaceWith(nw);
    document.getElementById("home-find")?.addEventListener("click",()=>setState({modalOpen:true}));
    document.getElementById("home-demo")?.addEventListener("click",()=>setState({idea:{id:"B001",name:"AI Inventory Demand Predictor",cat:"B2B SaaS",cs:"B2B",usp:"Cuts overstock 40% using ML forecasting for Shopify stores",diff:3},page:"dashboard",tab:"launch"}));
    const modal=renderModal();if(modal)document.body.appendChild(modal);
    return;
  }

  const nw=el("div",{id:"app"});
  const dash=el("div",{class:"dash"});
  dash.appendChild(renderSidebar());
  const main=el("div",{class:"main"});
  main.appendChild(renderTopbar());
  const content=el("div",{class:"content"});
  const TAB_FN={launch:renderLaunch,scripts:renderScripts,roadmap:renderRoadmap,notes:renderNotes,resources:renderResources};
  content.appendChild((TAB_FN[S.tab]||renderLaunch)());
  main.appendChild(content);dash.appendChild(main);nw.appendChild(dash);
  const drawer=renderDrawer();if(drawer)nw.appendChild(drawer);
  const modal=renderModal();if(modal)nw.appendChild(modal);
  app.replaceWith(nw);
  bindDash();
}
window.render=render;

// ── DASH EVENT BINDING ────────────────────────────────────
function bindDash(){
  // Check circles
  document.querySelectorAll(".ck").forEach(c=>c.addEventListener("click",()=>{
    const k=c.dataset.key;S.taskDone[k]=!S.taskDone[k];
    gasPost({action:"updateProgress",taskKey:k,status:S.taskDone[k]?"complete":"pending"});render();
  }));
  // Toolkit buttons
  document.querySelectorAll(".tk-btn").forEach(b=>b.addEventListener("click",()=>{
    const idx=parseInt(b.dataset.idx);setState({drawerTask:{...TASKS.p1[idx],idx}});
  }));
  // Launch
  document.getElementById("nuke-btn")?.addEventListener("click",()=>{confetti();setState({launched:true});});
  document.getElementById("go-roadmap")?.addEventListener("click",()=>setState({tab:"roadmap"}));
  // Script type buttons
  document.querySelectorAll(".sc-btn").forEach(b=>b.addEventListener("click",()=>{
    const type=b.dataset.type;
    if(S.scriptOuts[type]){S.scriptActive=type;render();}else genScript(type);
  }));
  // Scripts tab find idea button
  document.getElementById("scripts-find")?.addEventListener("click",()=>setState({modalOpen:true}));
  // Roadmap task checkboxes
  document.querySelectorAll(".tcb").forEach(b=>b.addEventListener("click",()=>{
    const k=b.dataset.key;S.taskDone[k]=!S.taskDone[k];
    gasPost({action:"updateProgress",taskKey:k,status:S.taskDone[k]?"complete":"pending"});render();
  }));
  // Notes
  document.getElementById("notes-area")?.addEventListener("input",e=>{
    S.notes=e.target.value;S.notesSaved=false;clearTimeout(notesTimer);
    notesTimer=setTimeout(async()=>{await gasPost({action:"saveNotes",notes:S.notes});S.notesSaved=true;render();},60000);
  });
  document.getElementById("cp-notes")?.addEventListener("click",e=>copyText(S.notes,e.currentTarget));
  // Topbar find idea
  document.querySelectorAll(".btn").forEach(b=>{if(b.textContent.trim()==="✨ Find Idea")b.addEventListener("click",()=>setState({modalOpen:true}));});
}

render();
</script>
</body>
</html>
