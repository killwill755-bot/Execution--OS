// ── GAS CALLS ─────────────────────────────────────────────────
async function gasPost(body){
  try{
    const r = await fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    return r.json();
  }catch(e){return{success:false}}
}

// ── CLAUDE AI CALL ────────────────────────────────────────────
async function askClaude(prompt, sys="You are an elite business strategist. Be concise and actionable."){
  try{
    const r = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:CLAUDE_MODEL,max_tokens:900,system:sys,messages:[{role:"user",content:prompt}]})
    });
    const d = await r.json();
    return d.content?.[0]?.text || "Error generating. Please try again.";
  }catch(e){return "Connection error. Please try again."}
}

const Ctx = createContext(null);
const INIT = {
  phase:"onboarding", tab:"launchpad",
  selectedIdea:null, top20:[],
  taskStatuses:{}, taskStarts:{},
  drawerTask:null, modalOpen:false,
  launched:false, confetti:false,
  notes:"# My Launch Notes\n\nCapture ideas, wins, blockers here...\n\n## Today\n- [ ] Complete Hour 1-3\n- [ ] Post on 2 channels\n\n## Wins\n\n## Blockers\n",
  notesSaved:true,
};

function reducer(s,a){
  switch(a.t){
    case"PHASE":return{...s,phase:a.v};
    case"TAB":return{...s,tab:a.v};
    case"IDEA":return{...s,selectedIdea:a.v,phase:"dashboard",modalOpen:false};
    case"TOP20":return{...s,top20:a.v};
    case"DRAWER":return{...s,drawerTask:a.v};
    case"MODAL":return{...s,modalOpen:a.v};
    case"LAUNCH":return{...s,launched:true,confetti:true};
    case"STOP_CF":return{...s,confetti:false};
    case"NOTES":return{...s,notes:a.v,notesSaved:false};
    case"NOTES_SAVED":return{...s,notesSaved:true};
    case"TASK":{
      const ns={...s.taskStatuses,[a.key]:a.status};
      const ts={...s.taskStarts};
      if(a.status==="active")ts[a.key]=Date.now(); else delete ts[a.key];
      return{...s,taskStatuses:ns,taskStarts:ts};
    }
    default:return s;
  }
}

function AppProvider({children}){
  const [state,dispatch]=useReducer(reducer,INIT);
  const notesTimer=useRef(null);

  useEffect(()=>{
    if(state.confetti){
      const t=setTimeout(()=>dispatch({t:"STOP_CF"}),4500);
      return()=>clearTimeout(t);
    }
  },[state.confetti]);

  useEffect(()=>{
    if(state.notesSaved)return;
    clearTimeout(notesTimer.current);
    notesTimer.current=setTimeout(async()=>{
      await gasPost({action:"saveNotes",notes:state.notes});
      dispatch({t:"NOTES_SAVED"});
    },60000);
    return()=>clearTimeout(notesTimer.current);
  },[state.notes,state.notesSaved]);

  const allTasks=["phase1","phase2","phase3","phase4"].flatMap(k=>TASKS[k]||[]);
  const doneCount=Object.values(state.taskStatuses).filter(s=>s==="complete").length;
  const overallPct=allTasks.length?Math.round((doneCount/allTasks.length)*100):0;
  const p1Tasks=TASKS.phase1;
  const p1Done=p1Tasks.filter(t=>state.taskStatuses[t.key]==="complete").length;
  const hasBottleneck=Object.values(state.taskStarts).some(ts=>(Date.now()-ts)>7200000);

  return(
    <Ctx.Provider value={{state,dispatch,all:{allTasks,doneCount,overallPct,p1Done,p1Total:p1Tasks.length,hasBottleneck}}}>
      {children}
    </Ctx.Provider>
  );
}

function useApp(){return useContext(Ctx);}

// ── IDEA MODAL ────────────────────────────────────────────────
function IdeaModal(){
  const {state,dispatch}=useApp();
  const [step,setStep]=useState(0);
  const [ans,setAns]=useState({});
  const [ideas,setIdeas]=useState([]);
  const [loading,setLoading]=useState(false);

  const isQ=step<QUESTIONS.length&&!loading;
  const isLoading=loading;
  const isResults=!loading&&step===QUESTIONS.length&&ideas.length>0;

  const handleNext=async()=>{
    if(!ans[step])return;
    if(step<QUESTIONS.length-1){setStep(s=>s+1);return;}
    setLoading(true);
    const profile={skillset:ans[0],audience:ans[1],result:ans[2],format:ans[3],revenue:ans[4]};
    // Try GAS first, fallback to local ranking
    try{
      const data=await gasPost({action:"filterTop20",userProfile:profile});
      if(data?.top20?.length>0){setIdeas(data.top20);}
      else throw new Error("No results");
    }catch{
      // Local ranking — shuffle with fake scores
      const ranked=IDEAS.map(i=>({...i,confidence:`${75+Math.floor(Math.random()*24)}%`}))
        .sort((a,b)=>parseInt(b.confidence)-parseInt(a.confidence));
      setIdeas(ranked);
    }
    setLoading(false);
    setStep(QUESTIONS.length);
  };

  const select=(idea)=>{
    dispatch({t:"IDEA",v:idea});
    gasPost({action:"populateRoadmap",ideaId:idea.id,userProfile:{skillset:ans[0],revenue:ans[4]}});
    setStep(0);setAns({});setIdeas([]);
  };

  if(!state.modalOpen)return null;
  const DIFF_C={1:C.green,2:C.green,3:C.amber,4:C.red,5:C.red};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(14px)",padding:20}} onClick={()=>dispatch({t:"MODAL",v:false})}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#0A0A0F",border:`1px solid ${C.borderBlue}`,borderRadius:24,width:"100%",maxWidth:900,maxHeight:"88vh",overflow:"hidden",display:"flex",flexDirection:"column",boxShadow:`0 0 100px ${C.blue}12`}}>
        <div style={{padding:"24px 30px 20px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <Badge color={C.blue} style={{marginBottom:8}}>IDEA ENGINE — 100 PREMIUM AI BUSINESSES</Badge>
            <div style={{fontSize:22,fontWeight:800,color:C.text}}>Find Your Perfect Business</div>
          </div>
          <button onClick={()=>dispatch({t:"MODAL",v:false})} style={{background:"rgba(255,255,255,0.06)",border:"none",color:C.sub,borderRadius:10,width:34,height:34,cursor:"pointer",fontSize:16}}>✕</button>
        </div>
        <div style={{flex:1,overflow:"auto",padding:"26px 30px"}}>
          {isQ&&(
            <div style={{animation:"fadeUp 0.3s ease"}}>
              <div style={{display:"flex",gap:6,marginBottom:30}}>
                {QUESTIONS.map((_,i)=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=step?C.blue:"rgba(255,255,255,0.07)",transition:"background 0.3s"}}/>)}
              </div>
              <div style={{fontSize:12,color:C.blue,fontWeight:700,marginBottom:10}}>QUESTION {step+1} OF {QUESTIONS.length}</div>
              <div style={{fontSize:20,fontWeight:700,color:C.text,marginBottom:24}}>{QUESTIONS[step].q}</div>
              <input autoFocus value={ans[step]||""} placeholder={QUESTIONS[step].p}
                onChange={e=>setAns(p=>({...p,[step]:e.target.value}))}
                onKeyDown={e=>e.key==="Enter"&&handleNext()}
                style={{width:"100%",background:"rgba(255,255,255,0.04)",border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 20px",fontSize:15,color:C.text,outline:"none",boxSizing:"border-box"}}
                onFocus={e=>e.target.style.borderColor=C.blue}
                onBlur={e=>e.target.style.borderColor=C.border}
              />
              <div style={{display:"flex",justifyContent:"space-between",marginTop:22}}>
                <Btn v="outline" onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0}>← Back</Btn>
                <Btn v="primary" onClick={handleNext} disabled={!ans[step]}>{step===QUESTIONS.length-1?"✨ Find My Ideas →":"Next →"}</Btn>
              </div>
            </div>
          )}
          {isLoading&&(
            <div style={{textAlign:"center",padding:"70px 0"}}>
              <div style={{display:"flex",justifyContent:"center",marginBottom:18}}><Spin size={52}/></div>
              <div style={{fontSize:20,fontWeight:700,color:C.text,marginBottom:8}}>Analyzing Your Profile...</div>

          {isResults&&(
            <div style={{animation:"fadeUp 0.3s ease"}}>
              <div style={{fontSize:12,color:C.green,fontWeight:700,marginBottom:18}}>✨ {ideas.length} ideas matched to your profile — ranked by confidence</div>

                {ideas.map((idea,i)=>{
                  const conf=parseInt(idea.confidence)||80;
                  const diff=parseInt(idea.difficulty)||3;
                  return(
                    <div key={idea.id||i} style={{background:"rgba(255,255,255,0.025)",border:`1px solid ${C.border}`,borderRadius:14,padding:18,cursor:"pointer",transition:"all 0.2s"}}
                      onMouseEnter={e=>{e.currentTarget.style.border=`1px solid ${C.borderBlue}`;e.currentTarget.style.background="rgba(0,122,255,0.05)";}}
                      onMouseLeave={e=>{e.currentTarget.style.border=`1px solid ${C.border}`;e.currentTarget.style.background="rgba(255,255,255,0.025)";}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>

                        <span style={{fontSize:14,fontWeight:800,color:C.green}}>{conf}%</span>
                      </div>
                      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:5,lineHeight:1.3}}>{idea.idea_name}</div>
                      <div style={{fontSize:11,color:C.muted,marginBottom:12,lineHeight:1.5}}>{idea.usp}</div>
                      <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:14}}>
                        <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:10,color:C.muted}}>Revenue</span><span style={{fontSize:10,color:C.green,fontWeight:700}}>$1K–$10K/mo</span></div>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:10,color:C.muted}}>Difficulty</span><div style={{display:"flex",gap:2}}>{[1,2,3,4,5].map(d=><div key={d} style={{width:7,height:7,borderRadius:2,background:d<=diff?DIFF_C[diff]:"rgba(255,255,255,0.1)"}}/>)}</div></div>

                      </div>
                      <Btn v="primary" size="sm" style={{width:"100%"}} onClick={()=>select(idea)}>🚀 Start Execution</Btn>

                })}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

  const [outs,setOuts]=useState({});
  const [loading,setLoading]=useState({});
  const [copied,setCopied]=useState({});

  const COPY_PROMPTS={
    reddit:(i)=>`Write a Reddit launch post for: "${i.idea_name}". USP: ${i.usp}. Story-first, reveal product at end. Include Reddit-formatted title and 300-word body.`,
    twitter:(i)=>`Write an 8-tweet viral thread for: "${i.idea_name}". USP: ${i.usp}. Tweet 1 is a scroll-stopper. Number each "1/" style.`,
    cold_dm:(i)=>`Write 3 cold DM versions for: "${i.idea_name}". USP: ${i.usp}. Short (50 words), Medium (100 words), Story-based (200 words). Human tone, not salesy.`,
    linkedin:(i)=>`Write a LinkedIn launch post for: "${i.idea_name}". USP: ${i.usp}. Hook, problem, solution, social proof, CTA in comments. LinkedIn algorithm optimized.`,

    setLoading(p=>({...p,[st.id]:false}));

      <h1 style={{fontSize:24,fontWeight:800,margin:"0 0 6px",color:C.text}}>24-Hour Script Vault</h1>

            <span>{st.icon}</span>{st.label}

      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>

          <Badge color={C.blue} style={{marginBottom:8}}>MASTER_DB SCRIPTS</Badge>

        </Glass>
        <Glass style={{padding:16}}>
          <Badge color={C.amber} style={{marginBottom:8}}>SCALING ROADMAP</Badge>
          <pre style={{fontSize:12,lineHeight:"1.7",color:"#B0B0C0",whiteSpace:"pre-wrap",margin:"0 0 10px",maxHeight:160,overflow:"auto"}}>{idea.scaling_roadmap}</pre>
          <Btn v="ghost" size="sm" onClick={()=>navigator.clipboard.writeText(idea.scaling_roadmap)}>📋 Copy</Btn>
        </Glass>
      </div>

      {active&&(
        <Glass style={{padding:18}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <Badge color={C.blue}>AI GENERATED — {active.toUpperCase().replace("_"," ")}</Badge>
            {outs[active]&&<div style={{display:"flex",gap:8}}>
              <Btn v="ghost" size="sm" onClick={()=>handleCopy(active)}>{copied[active]?"✓ Copied!":"📋 Copy All"}</Btn>
              <Btn v="ghost" size="sm" onClick={()=>{setOuts(p=>({...p,[active]:null}));handleClick(SCRIPTS.find(s=>s.id===active));}}>🔄</Btn>
            </div>}
          </div>
          {loading[active]?<div style={{textAlign:"center",padding:"30px 0"}}><div style={{display:"flex",justifyContent:"center",marginBottom:10}}><Spin/></div><div style={{color:C.blue,fontSize:12}}>Writing your script...</div></div>
          :outs[active]?<pre style={{fontSize:13,lineHeight:"1.75",color:"#C8C8D0",whiteSpace:"pre-wrap",margin:0,maxHeight:320,overflow:"auto"}}>{outs[active]}</pre>:null}
        </Glass>
      )}
    </div>
  );
}

// ── ROADMAP TAB ───────────────────────────────────────────────
function RoadmapTab(){
  const {state,dispatch,all}=useApp();

  const phaseDone=(key)=>(TASKS[key]||[]).filter(t=>state.taskStatuses[t.key]==="complete").length;

  const pie1=[
    {name:"Done",value:all.p1Done||0,color:C.blue},
    {name:"Left",value:Math.max(0,all.p1Total-(all.p1Done||0)),color:"rgba(255,255,255,0.05)"},
  ];
  const pie30=PHASE_META.map(p=>({name:p.short,value:Math.max(phaseDone(p.key),0.5),color:p.color}));

  return(
    <div style={{maxWidth:1100,margin:"0 auto",padding:"26px 22px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:22,flexWrap:"wrap",gap:14}}>
        <div>
          <h1 style={{fontSize:24,fontWeight:800,margin:"0 0 6px",color:C.text}}>30-Day Execution Roadmap</h1>
          <p style={{color:C.muted,fontSize:13,margin:0}}>Tick tasks as you complete them. Bottleneck alerts fire automatically.</p>
        </div>
        <div style={{display:"flex",gap:12}}>
          {[{data:pie1,label:"TODAY'S GOAL",val:`${all.p1Total?Math.round((all.p1Done/all.p1Total)*100):0}%`,sub:`${all.p1Done}/${all.p1Total} hrs`,color:C.blue},
            {data:pie30,label:"30-DAY SCALE",val:`${all.overallPct}%`,sub:`${all.doneCount}/${all.allTasks.length}`,color:C.green}
          ].map((chart,ci)=>(
            <Glass key={ci} style={{padding:"13px 16px",display:"flex",alignItems:"center",gap:11}}>
              <div style={{width:62,height:62}}>
                <ResponsiveContainer width="100%" height="100%">
                  <PieChart>
                    <Pie data={chart.data} cx="50%" cy="50%" innerRadius={17} outerRadius={29} dataKey="value" paddingAngle={2}>
                      {chart.data.map((e,i)=><Cell key={i} fill={e.color}/>)}
                    </Pie>
                  </PieChart>
                </ResponsiveContainer>
              </div>
              <div>
                <div style={{fontSize:9,color:C.muted,marginBottom:2}}>{chart.label}</div>
                <div style={{fontSize:19,fontWeight:800,color:chart.color}}>{chart.val}</div>
                <div style={{fontSize:11,color:C.sub}}>{chart.sub}</div>
              </div>
            </Glass>
          ))}
        </div>
      </div>

      <Glass style={{padding:"12px 18px",marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span style={{fontSize:12,color:C.muted}}>Overall Progress</span>
          <span style={{fontSize:12,fontWeight:700,color:C.blue}}>{all.doneCount} / {all.allTasks.length} tasks</span>
        </div>
        <div style={{height:5,background:"rgba(255,255,255,0.04)",borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${all.overallPct}%`,background:`linear-gradient(90deg,${C.blue},${C.green},${C.amber})`,borderRadius:3,transition:"width 0.5s ease"}}/>
        </div>
      </Glass>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:14}}>
        {PHASE_META.map(ph=>{
          const phaseTasks=TASKS[ph.key]||[];
          const done=phaseDone(ph.key);
          const pct=phaseTasks.length?Math.round((done/phaseTasks.length)*100):0;
          const isBottleneck=all.hasBottleneck&&ph.key==="phase1";
          return(
            <Glass key={ph.key} style={{padding:18,border:`1px solid ${isBottleneck?"rgba(239,68,68,0.3)":C.border}`,position:"relative",overflow:"hidden"}}>
              {isBottleneck&&<div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"linear-gradient(90deg,#EF4444,#F97316)",animation:"pulse 1.5s ease-in-out infinite"}}/>}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div>
                  <Badge color={ph.color} style={{marginBottom:5}}>{ph.short}</Badge>
                  <div style={{fontSize:14,fontWeight:700,color:C.text}}>{ph.label}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  {isBottleneck&&<div style={{fontSize:9,color:C.red,fontWeight:700,marginBottom:2}}>⚠ SLOW</div>}
                  <div style={{fontSize:20,fontWeight:800,color:ph.color}}>{pct}%</div>
                </div>
              </div>
              <div style={{height:3,background:"rgba(255,255,255,0.05)",borderRadius:2,marginBottom:10,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pct}%`,background:ph.color,borderRadius:2,transition:"width 0.4s ease"}}/>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {phaseTasks.map(task=>{
                  const isDone=state.taskStatuses[task.key]==="complete";
                  return(
                    <label key={task.key} style={{display:"flex",alignItems:"flex-start",gap:8,cursor:"pointer"}}>
                      <input type="checkbox" checked={isDone} onChange={()=>dispatch({t:"TASK",key:task.key,status:isDone?"pending":"complete"})} style={{display:"none"}}/>
                      <div style={{width:14,height:14,borderRadius:3,flexShrink:0,marginTop:2,background:isDone?ph.color:"rgba(255,255,255,0.05)",border:`1px solid ${isDone?ph.color:"rgba(255,255,255,0.1)"}`,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
                        {isDone&&<span style={{fontSize:8,color:"#000",fontWeight:900}}>✓</span>}
                      </div>
                      <div>
                        <div style={{fontSize:11,fontWeight:600,color:isDone?C.muted:C.text,textDecoration:isDone?"line-through":"none",lineHeight:1.3}}>{task.task}</div>
                        <div style={{fontSize:10,color:C.muted,marginTop:1}}>{task.tool}</div>
                      </div>
                    </label>
                  );
                })}
              </div>
            </Glass>
          );
        })}
      </div>
    </div>
  );
}

// ── NOTES TAB ─────────────────────────────────────────────────
function NotesTab(){
  const {state,dispatch}=useApp();
  return(
    <div style={{maxWidth:860,margin:"0 auto",padding:"26px 22px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <h1 style={{fontSize:24,fontWeight:800,margin:"0 0 4px",color:C.text}}>Scratchpad</h1>
          <p style={{color:C.muted,fontSize:13,margin:0}}>Markdown notes · {state.notesSaved?<span style={{color:C.green}}>✓ Auto-saved</span>:<span style={{color:C.amber}}>⟳ Saving...</span>}</p>
        </div>
        <Btn v="ghost" size="sm" onClick={()=>navigator.clipboard.writeText(state.notes)}>📋 Copy All</Btn>
      </div>
      <Glass style={{padding:4}}>
        <textarea value={state.notes} onChange={e=>dispatch({t:"NOTES",v:e.target.value})} style={{width:"100%",minHeight:540,background:"transparent",border:"none",outline:"none",color:"#C8C8D0",fontSize:14,lineHeight:"1.75",padding:18,fontFamily:"'SF Mono','Fira Code',monospace",boxSizing:"border-box",resize:"none"}}/>
      </Glass>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:7}}>
        <span style={{fontSize:11,color:C.muted}}>{state.notes.split("\n").length} lines · {state.notes.length} chars</span>
        <span style={{fontSize:11,color:C.muted}}>Auto-saves every 60s to Google Sheet</span>
      </div>
    </div>
  );
}

// ── RESOURCES TAB ─────────────────────────────────────────────
function ResourcesTab(){
  return(
    <div style={{maxWidth:960,margin:"0 auto",padding:"26px 22px"}}>
      <h1 style={{fontSize:24,fontWeight:800,margin:"0 0 6px",color:C.text}}>Resource Vault</h1>
      <p style={{color:C.muted,fontSize:13,marginBottom:22}}>Every tool you need to launch — no Googling required.</p>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:10}}>
        {RESOURCES.map(r=>(
          <a key={r.name} href={r.url} target="_blank" rel="noreferrer">
            <Glass style={{padding:16,cursor:"pointer",transition:"all 0.2s",display:"block"}}
              onMouseEnter={e=>{e.currentTarget.style.background="rgba(0,122,255,0.06)";e.currentTarget.style.borderColor="rgba(0,122,255,0.3)";}}
              onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.025)";e.currentTarget.style.borderColor=C.border;}}>
              <div style={{fontSize:24,marginBottom:6}}>{r.icon}</div>
              <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:2}}>{r.name}</div>
              <div style={{fontSize:10,color:C.muted,marginBottom:8}}>{r.desc}</div>
              <div style={{fontSize:10,color:C.blue,fontWeight:700}}>Open →</div>
            </Glass>
          </a>
        ))}
      </div>
    </div>
  );
}

// ── ONBOARDING ────────────────────────────────────────────────
function Onboarding(){
  const {dispatch}=useApp();
  return(
    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:40,background:`radial-gradient(ellipse at 50% 30%, rgba(0,122,255,0.07) 0%, transparent 60%)`}}>
      <div style={{textAlign:"center",maxWidth:540,animation:"fadeUp 0.6s ease"}}>
        <div style={{fontSize:54,marginBottom:14}}>⚡</div>
        <h1 style={{fontSize:36,fontWeight:900,margin:"0 0 12px",letterSpacing:"-1px",color:C.text}}>Execution OS</h1>
        <p style={{fontSize:15,color:C.sub,lineHeight:1.7,marginBottom:34}}>Your AI-powered business launch system.<br/>100 premium ideas · 7-hour framework · 30-day scaling plan.</p>
        <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap",marginBottom:28}}>
          <Btn v="primary" size="lg" onClick={()=>dispatch({t:"MODAL",v:true})}>✨ Find My Perfect Idea</Btn>
          <Btn v="ghost" size="lg" onClick={()=>dispatch({t:"IDEA",v:IDEAS[0]})}>View Demo →</Btn>
        </div>
        <div style={{display:"flex",gap:22,justifyContent:"center",flexWrap:"wrap"}}>
          {["100 Premium Ideas","7-Hour Launch","30-Day Scaling","AI Scripts"].map(f=>(
            <div key={f} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.muted}}>
              <div style={{width:5,height:5,borderRadius:"50%",background:C.blue}}/>
              {f}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────
const TAB_MAP={launchpad:LaunchpadTab,scripts:ScriptsTab,roadmap:RoadmapTab,notes:NotesTab,resources:ResourcesTab};

function AppShell(){
  const {state}=useApp();
  const TabComp=TAB_MAP[state.tab]||LaunchpadTab;

  return(
    <>
      <IdeaModal/>
      <ActionDrawer/>
      <Confetti/>
      {state.phase==="onboarding"&&(
        <div style={{height:"100vh",display:"flex",flexDirection:"column",background:C.bg}}>
          <Onboarding/>
        </div>
      )}
      {state.phase==="dashboard"&&(
        <div style={{height:"100vh",display:"flex",overflow:"hidden",background:C.bg}}>
          <Sidebar/>
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <TopBar/>
            <div style={{flex:1,overflow:"auto"}}><TabComp/></div>
          </div>
        </div>
      )}
    </>
  );
}

function App(){
  return(
    <AppProvider>
      <AppShell/>
    </AppProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
