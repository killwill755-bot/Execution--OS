*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0A0A0B;color:#F0F0F5;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
*{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.1) transparent}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
a{color:inherit;text-decoration:none}
input,textarea,button{font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes nuclearPulse{0%,100%{box-shadow:0 0 30px rgba(239,68,68,.5),0 0 70px rgba(239,68,68,.2)}50%{box-shadow:0 0 70px rgba(239,68,68,.9),0 0 140px rgba(239,68,68,.4)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 rgba(0,122,255,0)}50%{box-shadow:0 0 30px rgba(0,122,255,.25)}}
@keyframes cfFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* Layout */
#app{height:100vh;display:flex;flex-direction:column}
.dashboard{height:100vh;display:flex;overflow:hidden}
.sidebar{width:210px;flex-shrink:0;background:#0F0F13;border-right:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;height:100vh;position:sticky;top:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:54px;background:rgba(10,10,11,.95);border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;padding:0 22px;flex-shrink:0;position:sticky;top:0;z-index:50}
.content{flex:1;overflow:auto;padding:26px 22px}

/* Glass card */
.glass{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:14px;backdrop-filter:blur(20px)}

/* Buttons */
.btn{border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:13px;padding:11px 22px;transition:all .15s;letter-spacing:.3px;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#007AFF,#0055FF);color:#fff;box-shadow:0 4px 20px rgba(0,122,255,.3)}
.btn-ghost{background:rgba(255,255,255,.05);color:#9191A4;border:1px solid rgba(255,255,255,.07)}
.btn-success{background:linear-gradient(135deg,#34D399,#059669);color:#fff}
.btn-danger{background:linear-gradient(135deg,#EF4444,#DC2626);color:#fff}
.btn-sm{padding:8px 14px;font-size:12px}
.btn-lg{padding:16px 40px;font-size:16px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.8px}

/* Nav */
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;border:none;cursor:pointer;background:transparent;color:#9191A4;font-weight:500;font-size:13px;transition:all .15s;text-align:left;width:100%;font-family:inherit}
.nav-btn.active{background:rgba(0,122,255,.12);color:#007AFF;font-weight:700}

/* Modal overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(12px)}
.modal{background:#0A0A0F;border:1px solid rgba(0,122,255,.35);border-radius:24px;width:100%;max-width:860px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 0 100px rgba(0,122,255,.12)}

/* Progress bar */
.prog-wrap{height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.prog-bar{height:100%;border-radius:3px;transition:width .5s ease}

/* Task card */
.task-card{padding:16px 20px;transition:all .3s;cursor:default}
.task-card.active-card{animation:glow 3s ease-in-out infinite}

/* Confetti */
.cf-piece{position:fixed;top:-12px;pointer-events:none;border-radius:50%;animation:cfFall linear forwards}

/* Spinner */
.spinner{border-radius:50%;animation:spin .7s linear infinite}

/* Textarea */
textarea{resize:none;outline:none;background:transparent;border:none;color:#C8C8D0;font-size:14px;line-height:1.75;padding:18px;width:100%;font-family:'SF Mono','Fira Code',monospace}

/* Input */
.field{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:15px 18px;font-size:15px;color:#F0F0F5;outline:none;transition:border-color .2s;font-family:inherit}
.field:focus{border-color:#007AFF}

/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.grid-res{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}

/* Onboarding */
.onboard{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;background:radial-gradient(ellipse at 50% 30%,rgba(0,122,255,.07) 0%,transparent 60%)}

pre{white-space:pre-wrap;word-break:break-word}
</style>

async function askClaude(prompt, sys) {

      body: JSON.stringify({
        model: CLAUDE, max_tokens: 900,
        system: sys || "You are an elite business strategist. Be concise and actionable.",
        messages: [{role:"user", content:prompt}]

  } catch(e) { return "Connection error. Please try again."; }

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    Object.entries(attrs).forEach(([k,v]) => {
      if (k === "class") e.className = v;
      else if (k === "style" && typeof v === "object") Object.assign(e.style, v);
      else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
      else e.setAttribute(k, v);
    });
  }
  children.flat().forEach(c => {
    if (c === null || c === undefined) return;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return e;
}

function html(str) {
  const d = document.createElement("div");
  d.innerHTML = str;
  return d.firstChild || d;
}

// ── MINI SVG PIE ──────────────────────────────────
function makePie(pct, color, size=60) {
  const r = size/2 - 6;
  const cx = size/2, cy = size/2;
  const angle = (pct/100) * 2 * Math.PI;
  const x1 = cx + r * Math.sin(0);
  const y1 = cy - r * Math.cos(0);
  const x2 = cx + r * Math.sin(angle);
  const y2 = cy - r * Math.cos(angle);
  const large = angle > Math.PI ? 1 : 0;
  const innerR = r - 10;

  const pathD = pct >= 99
    ? `M ${cx} ${cy-r} A ${r} ${r} 0 1 1 ${cx-0.01} ${cy-r} Z M ${cx} ${cy-innerR} A ${innerR} ${innerR} 0 1 0 ${cx-0.01} ${cy-innerR} Z`
    : pct <= 0
    ? ""
    : `M ${cx} ${cy-r} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${cx + innerR*Math.sin(angle)} ${cy - innerR*Math.cos(angle)} A ${innerR} ${innerR} 0 ${large} 0 ${cx} ${cy-innerR} Z`;

  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="10"/>
    ${pct > 0 ? `<path d="${pathD}" fill="${color}" opacity="0.9"/>` : ''}
    <text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="11" font-weight="700" fill="${color}" font-family="-apple-system,sans-serif">${pct}%</text>
  </svg>`;
}

// ── MAIN RENDER ───────────────────────────────────
function render() {
  const app = document.getElementById("app");
  if (!app) return;

  // Home page
  if (S.page === "home") {
    const newApp = renderHome();
    newApp.id = "app";
    app.replaceWith(newApp);
    bindHomeEvents();

    // Modal
    const modal = renderModal();
    if (modal) {
      document.body.appendChild(modal);
      bindModalEvents();
    }
    return;
  }

  // Dashboard
  const newApp = el("div", {id:"app"});
  const dash = el("div", {class:"dashboard"});
  dash.appendChild(renderSidebar());

  const main = el("div", {class:"main"});
  main.appendChild(renderTopbar());

  const content = el("div", {class:"content"});
  const TAB_FN = {launch:renderLaunch, scripts:renderScripts, roadmap:renderRoadmap, notes:renderNotes, resources:renderResources};
  content.appendChild((TAB_FN[S.tab]||renderLaunch)());
  main.appendChild(content);
  dash.appendChild(main);
  newApp.appendChild(dash);

  // Modals/drawers
  const drawer = renderDrawer();
  if (drawer) newApp.appendChild(drawer);
  const modal = renderModal();
  if (modal) newApp.appendChild(modal);

  app.replaceWith(newApp);
  bindDashEvents();
}
window.render = render;

      <div style="display:flex;gap:10px;margin-top:16px;align-items:center">
        <button class="btn btn-primary btn-sm" id="cpDrawer" style="display:flex;align-items:center;gap:6px">📋 Copy All</button>
        <button class="btn btn-ghost btn-sm" id="rgDrawer" style="display:flex;align-items:center;gap:6px">🔄 Regenerate</button>
        <span style="font-size:11px;color:#4A4A5A;margin-left:auto">${result.length} chars</span>
      </div>`;
    document.getElementById("cpDrawer").onclick = () => {
      const txt = window._lastDrawerResult || result;
      navigator.clipboard.writeText(txt).then(() => {
        const b = document.getElementById("cpDrawer");
        if(b){ b.textContent="✓ Copied!"; b.style.background="#059669"; setTimeout(()=>{b.innerHTML="📋 Copy All";b.style.background="";},2000); }
      }).catch(() => {
        const ta=document.createElement("textarea"); ta.value=result;
        ta.style.cssText="position:fixed;opacity:0"; document.body.appendChild(ta);
        ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
        const b=document.getElementById("cpDrawer"); if(b){b.textContent="✓ Copied!";setTimeout(()=>{b.innerHTML="📋 Copy All";},2000);}
      });
    };
    document.getElementById("rgDrawer").onclick = () => runDrawerGenerate();
  }

  document.getElementById("gen-drawer-btn")?.addEventListener("click", runDrawerGenerate);

  // Close drawer
  document.getElementById("close-drawer")?.addEventListener("click", () => setState({drawerTask:null}));

  // Script type buttons — Premium prompts
  document.querySelectorAll(".script-type-btn").forEach(b => {
    b.addEventListener("click", async () => {
      const type = b.dataset.type;
      S.scriptActive = type;
      if (S.scriptOuts[type]) { render(); return; }
      if (!S.idea) return;
      S.scriptLoading[type] = true;
      render();
      const n = S.idea.name, u = S.idea.usp || "";
      const COPY_PROMPTS = {
        reddit: `You are an elite Reddit copywriter. Write a viral Reddit post for: "${n}" (${u})

TITLE: [Write a curiosity-gap title that gets clicks — genuine value, no clickbait]

POST BODY (300-400 words):
- Open with a relatable personal story or shocking stat (2 sentences)
- Describe the painful problem in vivid detail (3-4 sentences)
- Share what you discovered or built (3-4 sentences, do not oversell)
- Give 3-4 GENUINE value tips they can use right now
- Soft mention of your solution at the end
- End with a question to drive comments

BEST SUBREDDITS TO POST: [List 4 relevant subreddits]

Make it feel like a real person sharing genuine value, not an ad.`,

        twitter: `You are a viral Twitter copywriter. Write an 8-tweet thread for: "${n}" (${u})

Format each tweet exactly like this (number them):

1/
[HOOK — shocking stat, counterintuitive claim, or bold promise. Under 280 chars. Must make people stop scrolling]

2/
[Setup — describe the problem or backstory vividly]

3/
[Agitate — make the pain real with specific numbers or details]

4/
[Insight — the key thing most people miss]

5/
[Value tip 1 — specific and actionable]

6/
[Value tip 2 or case study result with numbers]

7/
[Solution reveal — introduce ${n} naturally, not salesy]

8/
[CTA — question to drive replies + follow for more]

Each tweet under 280 chars. Use line breaks for readability.`,

        cold_dm: `You are an elite cold outreach copywriter. Write 3 cold DM scripts for: "${n}" (${u})

---
VERSION 1 — ULTRA SHORT (under 50 words)
[Write it — conversational, specific, one clear ask]

---
VERSION 2 — MEDIUM (under 100 words)
[Write it — acknowledge their situation, hint at value, soft ask]

---
VERSION 3 — STORY-BASED (under 200 words)
[Write it — open with a result, connect to their pain, offer value first, then ask]

---
PRO TIPS:
- Best time to send: [day and time]
- Personalization tip: [what to research first]
- Follow-up if no reply after 3 days: [write the exact follow-up line]`,

        linkedin: `You are a LinkedIn algorithm expert and copywriter. Write a viral LinkedIn post for: "${n}" (${u})

LINE 1: [HOOK — bold single sentence that creates curiosity or makes a strong claim]

[blank line]

[2-3 sentences expanding on the hook]

[blank line]

[Body — 4-6 short paragraphs, each 1-3 lines max. Include: the problem, what you discovered, 3 specific insights with numbers, the solution reveal]

[blank line]

[Conclusion — 2 sentences summing up the key takeaway]

[blank line]

[CTA — Ask a question to drive comments. Say link in comments for your product]

---
HASHTAGS: [5 relevant hashtags]
BEST TIME TO POST: [day and time]
COMMENT TO PIN: [Write the comment with your product link]`,

        email: `You are an elite email copywriter. Write a complete launch email for: "${n}" (${u})

SUBJECT LINE OPTIONS:
A: [curiosity-based subject line]
B: [benefit-based subject line]

PREVIEW TEXT: [30-50 chars shown after subject in inbox]

---
EMAIL BODY:

Hi [First Name],

[HOOK — 2 sentences. Story, stat, or bold claim related to their pain]

[PROBLEM — 2-3 sentences in words they use themselves]

[AGITATE — 1-2 sentences making cost of inaction real]

[BRIDGE — 1-2 sentences: That is why I built...]

[SOLUTION — 3-4 sentences. Describe ${n} with specific outcome]

Here is what you get:
• [Deliverable 1 with specific outcome]
• [Deliverable 2 with specific outcome]
• [Deliverable 3 with specific outcome]

[OFFER — Price, what makes it a no-brainer, limited-time angle]

[CTA BUTTON TEXT]: [Write it]

[OBJECTION HANDLER — 1-2 sentences addressing the number 1 reason they will not buy]

---
FOLLOW-UP EMAIL (3 days later):
Subject: [Write it]
Body: [Write 3-4 sentence follow-up]`,
      };
      const sys = "You are a world-class direct-response copywriter. Write detailed, specific, actionable content. No generic advice. Every word should help someone make money.";
      const copy = await askClaude(COPY_PROMPTS[type]||COPY_PROMPTS.reddit, sys);
      S.scriptOuts[type] = copy;
      S.scriptLoading[type] = false;
      render();
    });
  });

  // Copy static scripts
  document.querySelector(".copy-static-scripts")?.addEventListener("click", () => S.idea && navigator.clipboard.writeText(S.idea.scripts));
  document.querySelector(".copy-static-scale")?.addEventListener("click",   () => S.idea && navigator.clipboard.writeText(S.idea.scale));

  // Roadmap task checkboxes
  document.querySelectorAll(".task-check").forEach(cb => {
    cb.addEventListener("change", e => {
      const key = e.target.dataset.key;
      S.taskDone[key] = e.target.checked;
      gasPost({action:"updateProgress", taskKey:key, status:e.target.checked?"complete":"pending"});
      render();
    });
  });

  // Notes
  document.getElementById("notes-area")?.addEventListener("input", e => {
    S.notes = e.target.value;
    S.notesSaved = false;
    clearTimeout(notesTimer);
    notesTimer = setTimeout(async () => {
      await gasPost({action:"saveNotes", notes:S.notes});
      S.notesSaved = true;
      render();
    }, 60000);
  });
  document.getElementById("copy-notes")?.addEventListener("click", () => navigator.clipboard.writeText(S.notes));

  // Modal open (if needed)
  if (S.modalOpen) bindModalEvents();
}

function bindHomeEvents() {
  document.getElementById("home-find-idea")?.addEventListener("click", () => {
    setState({modalOpen:true});
  });
  document.getElementById("home-demo")?.addEventListener("click", () => {
    setState({idea:IDEAS[0], page:"dashboard", tab:"launch"});
  });
}

function bindModalEvents() {
  document.getElementById("close-modal")?.addEventListener("click", () => {
    setState({modalOpen:false,qaStep:0,qaAnswers:{},qaIdeas:[],qaLoading:false});
  });

  // Event delegation — catches exec-btn clicks even after innerHTML updates
  const modalBody = document.getElementById("modal-body");
  if (modalBody) {
    modalBody.addEventListener("click", e => {
      const btn = e.target.closest(".exec-btn, .idea-pick-btn");
      if (!btn) return;
      e.stopPropagation();
      const idx = parseInt(btn.dataset.idx);
      const idea = S.qaIdeas[idx];
      if (idea) {
        S.idea = idea;
        S.modalOpen = false;
        S.qaStep = 0; S.qaAnswers = {}; S.qaIdeas = []; S.qaLoading = false;
        S.page = "dashboard"; S.tab = "launch";
        gasPost({action:"populateRoadmap", ideaId:idea.id});
        render();
      }
    });
  }

  document.getElementById("qa-input")?.addEventListener("input", e => {
    S.qaAnswers[S.qaStep] = e.target.value;
  });

  document.getElementById("qa-back")?.addEventListener("click", () => {
    if (S.qaStep > 0) setState({qaStep: S.qaStep-1});
  });

  document.getElementById("qa-next")?.addEventListener("click", handleQANext);

  document.getElementById("qa-input")?.addEventListener("keydown", e => {
    if (e.key === "Enter") handleQANext();
  });

  // Idea pick buttons — bind both class names
  document.querySelectorAll(".idea-pick-btn, .exec-btn").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.idx);
      const idea = S.qaIdeas[idx];
      if (idea) {
        S.idea = idea;
        S.modalOpen = false;
        S.qaStep = 0;
        S.qaAnswers = {};
        S.qaIdeas = [];
        S.qaLoading = false;
        S.page = "dashboard";
        S.tab = "launch";
        gasPost({action:"populateRoadmap", ideaId:idea.id});
        render();
      }
    });
  });
}

async function handleQANext() {
  const val = S.qaAnswers[S.qaStep] || "";
  if (!val) return;
  if (S.qaStep < QUESTIONS.length - 1) {
    S.qaStep++;
    // Re-render modal body for next question
    const body = document.getElementById("modal-body");
    if (body) { body.innerHTML = renderModalBody(); bindModalAfterRender(); }
    return;
  }
  // Last question — generate ideas
  S.qaLoading = true;
  const body = document.getElementById("modal-body");
  if (body) { body.innerHTML = renderModalBody(); }
  try {
    const data = await gasPost({action:"filterTop20",userProfile:{skillset:S.qaAnswers[0],audience:S.qaAnswers[1],format:S.qaAnswers[2],time:S.qaAnswers[3],revenue:S.qaAnswers[4]}});
    if (data?.top20?.length > 0) { S.qaIdeas = data.top20; }
    else throw new Error("no results");
  } catch {
    // Smart scoring from 250 ideas based on user answers
      const skill=(S.qaAnswers[0]||"").toLowerCase();
      const audience=(S.qaAnswers[1]||"").toLowerCase();
      const fmt=(S.qaAnswers[2]||"").toLowerCase();
      const scored=IDEAS.map(idea=>{
        let s=Math.floor(Math.random()*15)+60;
        if((skill.includes("cod")||skill.includes("tech"))&&idea.cat==="B2B SaaS") s+=28;
        if((skill.includes("writ")||skill.includes("copy"))&&(idea.cat==="Digital Service"||idea.cat==="Niche Content")) s+=28;
        if((skill.includes("financ")||skill.includes("consult"))&&idea.cat==="Real Estate AI") s+=28;
        if((skill.includes("sales")||skill.includes("market"))&&idea.cat==="Digital Service") s+=24;
        if((skill.includes("video")||skill.includes("design"))&&idea.cat==="Digital Service") s+=24;
        if((skill.includes("operat")||skill.includes("system"))&&idea.cat==="B2B SaaS") s+=20;
        if((audience.includes("real estate")||audience.includes("invest"))&&idea.cat==="Real Estate AI") s+=22;
        if((audience.includes("saas")||audience.includes("startup")||audience.includes("tech"))&&idea.cat==="B2B SaaS") s+=22;
        if((audience.includes("coach")||audience.includes("creator"))&&idea.cat==="Digital Service") s+=22;
        if((audience.includes("small biz")||audience.includes("freelan"))&&(idea.cat==="AI Utility"||idea.cat==="Niche Content")) s+=20;
        if((fmt.includes("newsletter")||fmt.includes("content"))&&idea.cat==="Niche Content") s+=22;
        if((fmt.includes("service")||fmt.includes("done"))&&idea.cat==="Digital Service") s+=22;
        if((fmt.includes("saas")||fmt.includes("software"))&&idea.cat==="B2B SaaS") s+=22;
        if((fmt.includes("consult"))&&(idea.cat==="AI Utility"||idea.cat==="Digital Service")) s+=20;
        return {...idea,conf:Math.min(s,99),confidence_score:Math.min(s,99)};
      });
      scored.sort((a,b)=>b.confidence_score-a.confidence_score);
      S.qaIdeas=scored.slice(0,10);
  }
  S.qaLoading = false;
  S.qaStep = QUESTIONS.length;
  if (body) { body.innerHTML = renderModalBody(); bindModalAfterRender(); }
}

function bindModalAfterRender() {
  // Bind Start Execution buttons (exec-btn) and legacy idea-pick-btn
  document.querySelectorAll(".exec-btn, .idea-pick-btn").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.idx);
      const idea = S.qaIdeas[idx];
      if (idea) {
        S.idea = idea;
        S.modalOpen = false;
        S.qaStep = 0;
        S.qaAnswers = {};
        S.qaIdeas = [];
        S.qaLoading = false;
        S.page = "dashboard";
        S.tab = "launch";
        gasPost({action:"populateRoadmap", ideaId:idea.id});
        render();
      }
    });
  });
}

// ── selectQAOption — called by option buttons ─────
function selectQAOption(val) {
  S.qaAnswers[S.qaStep] = val;
  // Update option buttons visually without full re-render
  document.querySelectorAll(".qa-opt-btn").forEach(btn => {
    const isSel = btn.dataset.val === val;
    btn.style.borderColor = isSel ? "#007AFF" : "rgba(255,255,255,.1)";
    btn.style.background   = isSel ? "rgba(0,122,255,.12)" : "rgba(255,255,255,.03)";
    btn.style.color        = isSel ? "#007AFF" : "#C8C8D0";
    btn.style.fontWeight   = isSel ? "700" : "500";
    const dot   = btn.querySelector(".opt-dot");
    const inner = btn.querySelector("span span");
    if (dot)   { dot.style.borderColor = isSel ? "#007AFF" : "rgba(255,255,255,.25)"; dot.style.background = isSel ? "#007AFF" : "transparent"; }
    if (inner) { inner.style.display = isSel ? "block" : "none"; }
  });
  // Enable Next button
  const nb = document.getElementById("qa-next-btn");
  if (nb) { nb.disabled = false; nb.style.opacity = "1"; }
  // Hide hint
  const hint = document.querySelector("#modal-body span[style*='Pick one']");
  if (hint) hint.style.display = "none";
}

// ── pickIdea — called by Start Execution button ───
function pickIdea(idx) {
  const idea = S.qaIdeas[idx];
  if (!idea) return;
  S.idea = idea;
  S.modalOpen = false;
  S.qaStep = 0;
  S.qaAnswers = {};
  S.qaIdeas = [];
  S.page = "dashboard";
  S.tab = "launch";
  gasPost({action:"populateRoadmap", ideaId:idea.id});
  render();
}

// Expose globally
window.handleQANext = handleQANext;
window.pickIdea = pickIdea;
window.selectQAOption = selectQAOption;
window.setState = setState;
window.S = S;
window.renderModalBody = renderModalBody;
window.bindModalAfterRender = bindModalAfterRender;
window.bindDashEvents = bindDashEvents;
window.bindHomeEvents = bindHomeEvents;
window.bindModalEvents = bindModalEvents;
window.render = render;

render();
</script>
</body>
</html>
