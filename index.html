async function callAI(prompt,sys){
  try{
    const r=await fetch(CAPI,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:MDL,max_tokens:900,
        system:sys||"You are an elite business strategist. Be concise, numbered, actionable.",

    const d=await r.json();
    return d.content?.[0]?.text||"Error — please try again.";
  }catch{return "Connection error — please try again."}
}

function totalDone(){return Object.values(S.taskDone).filter(Boolean).length}

function pct(){return Math.round(totalDone()/totalTasks()*100)||0}

function pie(p,col,sz=60){
  const r=sz/2-6,cx=sz/2,cy=sz/2,a=(p/100)*2*Math.PI;
  const x2=cx+r*Math.sin(a),y2=cy-r*Math.cos(a),ir=r-10;
  const arc=p>=99?`M${cx} ${cy-r} A${r} ${r} 0 1 1 ${cx-.01} ${cy-r}Z M${cx} ${cy-ir} A${ir} ${ir} 0 1 0 ${cx-.01} ${cy-ir}Z`
    :p<=0?"":`M${cx} ${cy-r} A${r} ${r} 0 ${a>Math.PI?1:0} 1 ${x2} ${y2} L${cx+ir*Math.sin(a)} ${cy-ir*Math.cos(a)} A${ir} ${ir} 0 ${a>Math.PI?1:0} 0 ${cx} ${cy-ir}Z`;
  return `<svg width="${sz}" height="${sz}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="10"/>${p>0?`<path d="${arc}" fill="${col}"/>`:""}
    <text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="11" font-weight="700" fill="${col}" font-family="-apple-system,sans-serif">${p}%</text></svg>`;
}

function confetti(){
  const cols=["#007AFF","#34D399","#F59E0B","#EC4899","#A78BFA","#FCD34D"];
  for(let i=0;i<80;i++)setTimeout(()=>{
    const d=document.createElement("div");
    Object.assign(d.style,{position:"fixed",top:"-12px",left:`${Math.random()*100}vw`,
      width:`${5+Math.random()*9}px`,height:`${5+Math.random()*9}px`,
      background:cols[i%cols.length],borderRadius:Math.random()>.5?"50%":"2px",
      zIndex:"9999",animation:`cfFall ${1.5+Math.random()*2}s ease-in forwards`,
      animationDelay:`${Math.random()*.8}s`,transform:`rotate(${Math.random()*360}deg)`});
    document.body.appendChild(d);setTimeout(()=>d.remove(),4000);
  },i*25);
}

async function genScript(ch,outEl){
  if(!S.idea)return;
  S.scriptActive=ch.id;
  if(S.scriptOuts[ch.id]){render();return;}
  S.scriptLoading[ch.id]=true;render();
  const P={
    reddit:`Reddit post for: "${S.idea.name}". USP: ${S.idea.usp}. Story-first, product at end. Title + 300-word body in Reddit markdown.`,
    twitter:`8-tweet viral thread for: "${S.idea.name}". Tweet 1 is scroll-stopping. Number "1/" style.`,
    cold_dm:`3 cold DMs for: "${S.idea.name}". Short (50w), Medium (100w), Story (200w). Human, not salesy.`,
    linkedin:`LinkedIn launch post for: "${S.idea.name}". Hook → problem → solution → CTA in comments.`,
    email:`Launch email for: "${S.idea.name}". Subject (2 options), preview, full body with hook/story/offer/CTA, PS line.`,
  };
  S.scriptOuts[ch.id]=await callAI(P[ch.id],"You are an elite direct-response copywriter. Be specific and conversion-focused.");
  S.scriptLoading[ch.id]=false;render();
}

    boxShadow:"0 0 100px rgba(0,122,255,.12)"});
  box.innerHTML=`
    <div style="padding:24px 30px 20px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <span style="background:rgba(0,122,255,.15);border:1px solid rgba(0,122,255,.4);color:#007AFF;font-size:10px;font-weight:700;padding:2px 9px;border-radius:5px;display:inline-block;margin-bottom:8px">IDEA ENGINE — 100 PREMIUM AI BUSINESSES</span>
        <div style="font-size:22px;font-weight:800">Find Your Perfect Business</div>
      </div>
      <button id="closeM" style="background:rgba(255,255,255,.06);border:none;color:#9191A4;border-radius:10px;width:34px;height:34px;cursor:pointer;font-size:16px">✕</button>
    </div>
    <div id="mBody" style="flex:1;overflow:auto;padding:26px 30px"></div>`;
  box.querySelector("#closeM").onclick=()=>{S.modal=false;S.qaStep=0;S.qaAnswers={};S.qaIdeas=[];S.qaLoading=false;render()};
  ov.appendChild(box);
  showModalStep(box.querySelector("#mBody"));
  return ov;
}

function showModalStep(body){
  if(S.qaLoading){
    body.innerHTML=`<div style="text-align:center;padding:70px 0">
      <div style="width:52px;height:52px;border:4px solid rgba(0,122,255,.2);border-top-color:#007AFF;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 18px"></div>
      <div style="font-size:20px;font-weight:700;margin-bottom:8px">Analyzing Your Profile...</div>
      <div style="color:#4A4A5A;font-size:13px">Matching from 100 premium ideas</div>
    </div>`;
    return;
  }
  if(S.qaIdeas.length>0&&S.qaStep>=QS.length){
    // Results screen
    body.innerHTML=`<div style="font-size:12px;color:#34D399;font-weight:700;margin-bottom:18px">✨ ${S.qaIdeas.length} ideas matched — ranked by confidence</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px" id="ideaCards"></div>`;
    const grid=body.querySelector("#ideaCards");
    S.qaIdeas.forEach((idea,i)=>{
      const diff=parseInt(idea.diff)||3;
      const dc={1:"#34D399",2:"#34D399",3:"#F59E0B",4:"#EF4444",5:"#EF4444"}[diff];
      const card=el("div","glass");
      Object.assign(card.style,{padding:"18px",cursor:"pointer",transition:"all .2s"});
      card.onmouseover=()=>{card.style.borderColor="rgba(0,122,255,.35)";card.style.background="rgba(0,122,255,.05)"};
      card.onmouseout=()=>{card.style.borderColor="rgba(255,255,255,.07)";card.style.background="rgba(255,255,255,.025)"};
      card.innerHTML=`
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <span style="background:rgba(0,122,255,.15);border:1px solid rgba(0,122,255,.4);color:#007AFF;font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px">${(idea.cat||"AI").split(" ")[0]}</span>
          <span style="font-size:14px;font-weight:800;color:#34D399">${idea.conf||80}%</span>
        </div>
        <div style="font-size:13px;font-weight:700;margin-bottom:5px;line-height:1.3">${idea.name}</div>
        <div style="font-size:11px;color:#4A4A5A;margin-bottom:12px;line-height:1.5">${idea.usp}</div>
        <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:14px">
          <div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:#4A4A5A">Revenue</span><span style="font-size:10px;color:#34D399;font-weight:700">$1K–$10K/mo</span></div>
          <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:10px;color:#4A4A5A">Difficulty</span><div style="display:flex;gap:2px">${[1,2,3,4,5].map(d=>`<div style="width:7px;height:7px;border-radius:2px;background:${d<=diff?dc:"rgba(255,255,255,.1)"}"></div>`).join("")}</div></div>
          <div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:#4A4A5A">Launch Speed</span><span style="font-size:10px;color:#F59E0B;font-weight:700">7 hours</span></div>
        </div>`;
      const startBtn=el("button","btn btn-p sm");
      startBtn.style.width="100%";startBtn.textContent="🚀 Start Execution";
      startBtn.onclick=e=>{
        e.stopPropagation();
        S.idea=idea;S.modal=false;S.qaStep=0;S.qaAnswers={};S.qaIdeas=[];S.qaLoading=false;
        S.page="dashboard";S.tab="launch";
        gasPost({action:"populateRoadmap",ideaId:idea.id});
        render();
      };
      card.appendChild(startBtn);
      grid.appendChild(card);
    });
    return;
  }

  // Question screen
  const step=S.qaStep;
  const q=QS[step];
  const sel=S.qaAnswers[step]||"";
  const bars=QS.map((_,i)=>`<div style="flex:1;height:3px;border-radius:2px;background:${i<=step?"#007AFF":"rgba(255,255,255,.07)"}"></div>`).join("");

  const stepDiv=el("div","");stepDiv.style.animation="fadeUp .3s ease";
  stepDiv.innerHTML=`
    <div style="display:flex;gap:6px;margin-bottom:26px">${bars}</div>
    <div style="font-size:12px;color:#007AFF;font-weight:700;margin-bottom:8px">QUESTION ${step+1} OF ${QS.length}</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <span style="font-size:26px">${q.icon}</span>
      <div style="font-size:19px;font-weight:700">${q.q}</div>
    </div>
    <div id="optsGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px"></div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <button class="btn btn-g" id="backBtn" ${step===0?"disabled":""}>← Back</button>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="pickHint" style="font-size:12px;color:#4A4A5A;display:${sel?"none":"block"}">👆 Pick one to continue</span>
        <button class="btn btn-p" id="nextBtn" ${!sel?"disabled":""} style="opacity:${sel?1:.4}">${step===QS.length-1?"✨ Find My Ideas →":"Next →"}</button>
      </div>
    </div>`;

  // Option buttons
  const grid=stepDiv.querySelector("#optsGrid");
  q.opts.forEach(opt=>{
    const isSel=sel===opt;
    const b=el("button","btn");
    Object.assign(b.style,{padding:"12px 16px",borderRadius:"10px",width:"100%",textAlign:"left",
      border:`2px solid ${isSel?"#007AFF":"rgba(255,255,255,.1)"}`,
      background:isSel?"rgba(0,122,255,.12)":"rgba(255,255,255,.03)",
      color:isSel?"#007AFF":"#C8C8D0",fontWeight:isSel?"700":"500",
      display:"flex",alignItems:"center",gap:"10px",fontSize:"13px"});
    b.innerHTML=`<span style="width:16px;height:16px;border-radius:50%;flex-shrink:0;
      border:2px solid ${isSel?"#007AFF":"rgba(255,255,255,.25)"};background:${isSel?"#007AFF":"transparent"};
      display:flex;align-items:center;justify-content:center">
      ${isSel?'<span style="width:6px;height:6px;border-radius:50%;background:#fff;display:block"></span>':""}
    </span>${opt}`;
    b.onclick=()=>{
      S.qaAnswers[step]=opt;
      // Update all buttons visually
      grid.querySelectorAll("button").forEach(btn=>{
        const s=btn.textContent.trim()===opt;
        btn.style.borderColor=s?"#007AFF":"rgba(255,255,255,.1)";
        btn.style.background=s?"rgba(0,122,255,.12)":"rgba(255,255,255,.03)";
        btn.style.color=s?"#007AFF":"#C8C8D0";
        btn.style.fontWeight=s?"700":"500";
      });
      // Enable Next button
      const nb=stepDiv.querySelector("#nextBtn");
      if(nb){nb.disabled=false;nb.style.opacity="1";}
      const hint=stepDiv.querySelector("#pickHint");
      if(hint)hint.style.display="none";
    };
    grid.appendChild(b);
  });

  // Back
  stepDiv.querySelector("#backBtn").onclick=()=>{
    if(S.qaStep>0){S.qaStep--;showModalStep(body);}
  };

  // Next
  stepDiv.querySelector("#nextBtn").onclick=async()=>{
    const val=S.qaAnswers[S.qaStep];
    if(!val)return;
    if(S.qaStep<QS.length-1){
      S.qaStep++;
      showModalStep(body);
      return;
    }
    // Last step — get ideas
    S.qaLoading=true;
    showModalStep(body);
    try{
      const data=await gasPost({action:"filterTop20",userProfile:{
        skillset:S.qaAnswers[0],audience:S.qaAnswers[1],
        format:S.qaAnswers[2],time:S.qaAnswers[3],revenue:S.qaAnswers[4]
      }});
      S.qaIdeas=data?.top20?.length>0?data.top20:null;
      if(!S.qaIdeas)throw new Error();
    }catch{
      // Local fallback
      S.qaIdeas=IDEAS.map(i=>({...i,conf:75+Math.floor(Math.random()*24)})).sort((a,b)=>b.conf-a.conf);
    }
    S.qaLoading=false;
    S.qaStep=QS.length;
    showModalStep(body);
  };

  body.innerHTML="";
  body.appendChild(stepDiv);
}

// START
render();
</script>
</body>
</html>
