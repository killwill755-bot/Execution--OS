/* Spinner */

}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    Object.entries(attrs).forEach(([k,v]) => {
      if (k === "class") e.className = v;
      else if (k === "style" && typeof v === "object") Object.assign(e.style, v);
      else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
      else e.setAttribute(k, v);
    });
  }
  children.flat().forEach(c => {
    if (c === null || c === undefined) return;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return e;
}

// ── MINI SVG PIE ──────────────────────────────────
function makePie(pct, color, size=60) {
  const r = size/2 - 6;
  const cx = size/2, cy = size/2;
  const angle = (pct/100) * 2 * Math.PI;
  const x1 = cx + r * Math.sin(0);
  const y1 = cy - r * Math.cos(0);
  const x2 = cx + r * Math.sin(angle);
  const y2 = cy - r * Math.cos(angle);
  const large = angle > Math.PI ? 1 : 0;
  const innerR = r - 10;

  const pathD = pct >= 99
    ? `M ${cx} ${cy-r} A ${r} ${r} 0 1 1 ${cx-0.01} ${cy-r} Z M ${cx} ${cy-innerR} A ${innerR} ${innerR} 0 1 0 ${cx-0.01} ${cy-innerR} Z`
    : pct <= 0
    ? ""
    : `M ${cx} ${cy-r} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${cx + innerR*Math.sin(angle)} ${cy - innerR*Math.cos(angle)} A ${innerR} ${innerR} 0 ${large} 0 ${cx} ${cy-innerR} Z`;

  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="10"/>
    ${pct > 0 ? `<path d="${pathD}" fill="${color}" opacity="0.9"/>` : ''}
    <text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="11" font-weight="700" fill="${color}" font-family="-apple-system,sans-serif">${pct}%</text>
  </svg>`;
}

// ── CONFETTI ──────────────────────────────────────
function spawnConfetti() {
  const colors = ["#007AFF","#34D399","#F59E0B","#EC4899","#A78BFA","#FCD34D"];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const d = document.createElement("div");
      d.className = "cf-piece";
      d.style.cssText = `
        left:${Math.random()*100}vw;
        width:${5+Math.random()*9}px;height:${5+Math.random()*9}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>.5?"50%":"2px"};
        z-index:9999;
        animation-duration:${1.5+Math.random()*2}s;
        transform:rotate(${Math.random()*360}deg);
      `;
      document.body.appendChild(d);
      setTimeout(() => d.remove(), 4000);
    }, i * 30);
  }
}

      <div class="spinner" style="width:52px;height:52px;border:4px solid rgba(0,122,255,.2);border-top-color:#007AFF;margin:0 auto 18px"></div>
      <div style="font-size:20px;font-weight:700;margin-bottom:8px">Analyzing Your Profile...</div>
      <div style="color:#4A4A5A;font-size:13px">Scanning 100 premium ideas · Calculating confidence scores</div>
    </div>
  `;

  if (isResults) {
    const cards = S.qaIdeas.map((idea,i) => {
      const diff = parseInt(idea.diff)||3;
      const diffC = {1:"#34D399",2:"#34D399",3:"#F59E0B",4:"#EF4444",5:"#EF4444"}[diff];
      return `
        <div class="idea-select-card" data-idx="${i}" style="background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px;cursor:pointer;transition:all .2s"
          onmouseover="this.style.borderColor='rgba(0,122,255,.35)';this.style.background='rgba(0,122,255,.05)'"
          onmouseout="this.style.borderColor='rgba(255,255,255,.07)';this.style.background='rgba(255,255,255,.025)'">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
            <span class="badge" style="background:rgba(0,122,255,.15);border:1px solid rgba(0,122,255,.4);color:#007AFF;font-size:9px">${(idea.cat||"AI").split(" ")[0]}</span>
            <span style="font-size:14px;font-weight:800;color:#34D399">${idea.conf}%</span>
          </div>
          <div style="font-size:13px;font-weight:700;margin-bottom:5px;line-height:1.3">${idea.name}</div>
          <div style="font-size:11px;color:#4A4A5A;margin-bottom:12px;line-height:1.5">${idea.usp}</div>
          <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:14px">
            <div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:#4A4A5A">Revenue</span><span style="font-size:10px;color:#34D399;font-weight:700">$1K–$10K/mo</span></div>
            <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:10px;color:#4A4A5A">Difficulty</span><div style="display:flex;gap:2px">${[1,2,3,4,5].map(d=>`<div style="width:7px;height:7px;border-radius:2px;background:${d<=diff?diffC:"rgba(255,255,255,.1)"}"></div>`).join("")}</div></div>
            <div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:#4A4A5A">Launch Speed</span><span style="font-size:10px;color:#F59E0B;font-weight:700">7 hours</span></div>
          </div>
          <button class="btn btn-primary btn-sm idea-pick-btn" data-idx="${i}" style="width:100%">🚀 Start Execution</button>
        </div>
      `;
    }).join("");
    return `
      <div style="font-size:12px;color:#34D399;font-weight:700;margin-bottom:18px">✨ ${S.qaIdeas.length} ideas matched — ranked by confidence</div>
      <div class="grid-auto">${cards}</div>
    `;
  }

  // Question view
  const q = QUESTIONS[step] || QUESTIONS[0];
  const bars = QUESTIONS.map((_,i) => `<div style="flex:1;height:3px;border-radius:2px;background:${i<=step?"#007AFF":"rgba(255,255,255,.07)"}"></div>`).join("");
  return `
    <div style="animation:fadeUp .3s ease">
      <div style="display:flex;gap:6px;margin-bottom:30px">${bars}</div>
      <div style="font-size:12px;color:#007AFF;font-weight:700;margin-bottom:10px">QUESTION ${step+1} OF ${QUESTIONS.length}</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:24px">${q.q}</div>
      <input id="qa-input" class="field" placeholder="${q.p}" value="${S.qaAnswers[step]||""}">
      <div style="display:flex;justify-content:space-between;margin-top:22px">
        <button class="btn btn-ghost" id="qa-back" ${step===0?"disabled":""}>← Back</button>
        <button class="btn btn-primary" id="qa-next">${step===QUESTIONS.length-1?"✨ Find My Ideas →":"Next →"}</button>
      </div>
    </div>
  `;
}

// ── HOME SCREEN ───────────────────────────────────
function renderHome() {
  const wrap = el("div", {id:"app", style:{height:"100vh",display:"flex",flexDirection:"column",background:"#0A0A0B"}});
  const onboard = el("div", {class:"onboard"});
  onboard.innerHTML = `
    <div style="text-align:center;max-width:540px;animation:fadeUp .6s ease">
      <div style="font-size:54px;margin-bottom:14px">⚡</div>
      <h1 style="font-size:36px;font-weight:900;margin-bottom:12px;letter-spacing:-1px">Execution OS</h1>
      <p style="font-size:15px;color:#9191A4;line-height:1.7;margin-bottom:34px">Your AI-powered business launch system.<br>100 premium ideas · 7-hour framework · 30-day scaling plan.</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:28px">
        <button class="btn btn-primary btn-lg" id="home-find-idea">✨ Find My Perfect Idea</button>
        <button class="btn btn-ghost btn-lg" id="home-demo">View Demo →</button>
      </div>
      <div style="display:flex;gap:22px;justify-content:center;flex-wrap:wrap">
        ${["100 Premium Ideas","7-Hour Launch","30-Day Scaling","AI Scripts"].map(f=>`
          <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#4A4A5A">
            <div style="width:5px;height:5px;border-radius:50%;background:#007AFF"></div>${f}
          </div>`).join("")}
      </div>
    </div>
  `;
  wrap.appendChild(onboard);
  return wrap;
}

// ── MAIN RENDER ───────────────────────────────────
function render() {
  const app = document.getElementById("app");
  if (!app) return;

  // Home page
  if (S.page === "home") {
    const newApp = renderHome();
    newApp.id = "app";
    app.replaceWith(newApp);
    bindHomeEvents();

    // Modal
    const modal = renderModal();
    if (modal) {
      document.body.appendChild(modal);
      bindModalEvents();
    }
    return;
  }

  // Dashboard
  const newApp = el("div", {id:"app"});
  const dash = el("div", {class:"dashboard"});
  dash.appendChild(renderSidebar());

  const main = el("div", {class:"main"});
  main.appendChild(renderTopbar());

  const content = el("div", {class:"content"});
  const TAB_FN = {launch:renderLaunch, scripts:renderScripts, roadmap:renderRoadmap, notes:renderNotes, resources:renderResources};
  content.appendChild((TAB_FN[S.tab]||renderLaunch)());
  main.appendChild(content);
  dash.appendChild(main);
  newApp.appendChild(dash);

  // Modals/drawers
  const drawer = renderDrawer();
  if (drawer) newApp.appendChild(drawer);
  const modal = renderModal();
  if (modal) newApp.appendChild(modal);

  app.replaceWith(newApp);
  bindDashEvents();
}

// ── EVENT BINDING ─────────────────────────────────
function bindHomeEvents() {
  document.getElementById("home-find-idea")?.addEventListener("click", () => {
    setState({modalOpen:true});
  });
  document.getElementById("home-demo")?.addEventListener("click", () => {
    setState({idea:IDEAS[0], page:"dashboard", tab:"launch"});
  });
}

function bindModalEvents() {
  document.getElementById("close-modal")?.addEventListener("click", () => {
    setState({modalOpen:false,qaStep:0,qaAnswers:{},qaIdeas:[],qaLoading:false});
  });

  document.getElementById("qa-input")?.addEventListener("input", e => {
    S.qaAnswers[S.qaStep] = e.target.value;
  });

  document.getElementById("qa-back")?.addEventListener("click", () => {
    if (S.qaStep > 0) setState({qaStep: S.qaStep-1});
  });

  document.getElementById("qa-next")?.addEventListener("click", handleQANext);

  document.getElementById("qa-input")?.addEventListener("keydown", e => {
    if (e.key === "Enter") handleQANext();
  });

  // Idea pick buttons
  document.querySelectorAll(".idea-pick-btn").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.idx);
      const idea = S.qaIdeas[idx];
      if (idea) {
        S.idea = idea;
        S.modalOpen = false;
        S.qaStep = 0; S.qaAnswers = {}; S.qaIdeas = [];
        S.page = "dashboard";
        S.tab = "launch";
        gasPost({action:"populateRoadmap",ideaId:idea.id,userProfile:{skillset:S.qaAnswers[0]}});
        render();
      }
    });
  });
}

async function handleQANext() {
  const input = document.getElementById("qa-input");
  const val = input ? input.value.trim() : (S.qaAnswers[S.qaStep]||"");
  if (!val) return;
  S.qaAnswers[S.qaStep] = val;

  if (S.qaStep < QUESTIONS.length - 1) {
    setState({qaStep: S.qaStep+1});
    return;
  }

  // Last question — generate ideas
  setState({qaLoading:true});

  try {
    const data = await gasPost({action:"filterTop20",userProfile:{skillset:S.qaAnswers[0],audience:S.qaAnswers[1],result:S.qaAnswers[2],format:S.qaAnswers[3],revenue:S.qaAnswers[4]}});
    if (data?.top20?.length > 0) {
      setState({qaIdeas:data.top20, qaLoading:false, qaStep:QUESTIONS.length});
    } else throw new Error("no results");
  } catch {
    // Fallback: local ranking
    const ranked = IDEAS.map(i=>({...i,conf:75+Math.floor(Math.random()*24)}))
      .sort((a,b)=>b.conf-a.conf);
    setState({qaIdeas:ranked, qaLoading:false, qaStep:QUESTIONS.length});
  }
}

function bindDashEvents() {
  // Find idea button
  document.querySelector(".btn-primary[data-find]")?.addEventListener("click", ()=>setState({modalOpen:true}));

  // Topbar find idea
  document.querySelectorAll(".btn-primary").forEach(b=>{
    if(b.textContent.includes("Find Idea")) b.addEventListener("click",()=>setState({modalOpen:true}));
  });

  // Task checkboxes (roadmap)
  document.querySelectorAll(".task-check").forEach(cb=>{
    cb.addEventListener("change", e=>{
      const key = e.target.dataset.key;
      S.taskDone[key] = e.target.checked;
      gasPost({action:"updateProgress",taskKey:key,status:e.target.checked?"complete":"pending"});
      render();
    });
  });

  // Task circle toggle (launchpad)
  document.querySelectorAll(".check-circle").forEach(c=>{
    c.addEventListener("click", ()=>{
      const key = c.dataset.key;
      S.taskDone[key] = !S.taskDone[key];
      gasPost({action:"updateProgress",taskKey:key,status:S.taskDone[key]?"complete":"pending"});
      render();
    });
  });

  // Toolkit buttons
  document.querySelectorAll(".toolkit-btn").forEach(b=>{
    b.addEventListener("click", ()=>{
      const idx = parseInt(b.dataset.idx);
      const task = {...TASKS.p1[idx], idx};
      setState({drawerTask:task});
    });
  });

  // Nuclear button
  document.getElementById("nuclear-btn")?.addEventListener("click", ()=>{
    spawnConfetti();
    setState({launched:true});
  });

  // Go to roadmap
  document.getElementById("go-roadmap")?.addEventListener("click",()=>setState({tab:"roadmap"}));

  // Drawer generate
  document.getElementById("gen-drawer-btn")?.addEventListener("click", async()=>{
    const task = S.drawerTask;
    const idea = S.idea;
    const body = document.getElementById("drawer-body");
    if(!body)return;
    body.innerHTML = `<div style="text-align:center;padding:50px"><div class="spinner" style="width:36px;height:36px;border:3px solid rgba(0,122,255,.2);border-top-color:#007AFF;margin:0 auto 14px"></div><div style="color:#007AFF;font-size:13px">Generating your plan...</div></div>`;

    const prompts = [
      `Business: "${idea?.name}". USP: ${idea?.usp}. Write a 6-step market validation plan with search terms, 3 subreddits to check, and 3 qualifying questions for prospects.`,
      `Business: "${idea?.name}". Identify 5 competitors I should research, what differentiates me, and how to position to win.`,
      `Business: "${idea?.name}". USP: ${idea?.usp}. Write 3 irresistible offer variants: core promise, price, what is included, one-line pitch.`,
      `Business: "${idea?.name}". Write complete landing page copy: hero headline, subheadline, 3 benefit bullets, 3 FAQs, CTA text. Ready to paste.`,
      `Business: "${idea?.name}". Give exact step-by-step Gumroad setup: product creation, pricing, checkout, handling first refund.`,
      `Business: "${idea?.name}". Write 3 lead magnet ideas with title, format, 50-word description. Then full outline for the best one.`,
      `Business: "${idea?.name}". Write launch day war room plan: what to post first, metrics to check every 30 min, what to do with zero sales in 3 hours.`,
    ];

    const result = await askClaude(prompts[task.idx]||prompts[0]);
    body.innerHTML = `
      <div style="background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:18px;font-size:13px;line-height:1.75;color:#C8C8D0;white-space:pre-wrap;max-height:320px;overflow:auto">${result}</div>
      <div style="display:flex;gap:10px;margin-top:14px">
        <button class="btn btn-ghost btn-sm" onclick="navigator.clipboard.writeText(this.closest('[style]').querySelector('div').textContent)">📋 Copy All</button>
        <button class="btn btn-ghost btn-sm" id="gen-drawer-btn">🔄 Regenerate</button>
      </div>
    `;
    // Re-bind regen
    body.querySelector("#gen-drawer-btn")?.addEventListener("click", ()=>{
      document.getElementById("gen-drawer-btn")?.click();
    });
  });

  // Close drawer
  document.getElementById("close-drawer")?.addEventListener("click",()=>setState({drawerTask:null}));

  // Script type buttons
  document.querySelectorAll(".script-type-btn").forEach(b=>{
    b.addEventListener("click", async()=>{
      const type = b.dataset.type;
      setState({scriptActive:type});

      if (S.scriptOuts[type]) return;
      if (!S.idea) return;

      S.scriptLoading[type] = true;
      render();

      const COPY_PROMPTS = {
        reddit: `Write a Reddit launch post for: "${S.idea.name}". USP: ${S.idea.usp}. Story-first, reveal product at end. Reddit markdown title and 300-word body.`,
        twitter: `Write an 8-tweet viral thread for: "${S.idea.name}". USP: ${S.idea.usp}. Tweet 1 is scroll-stopping. Number each "1/" style.`,
        cold_dm: `Write 3 cold DM versions for: "${S.idea.name}". Short (50 words), Medium (100 words), Story-based (200 words). Human tone.`,
        linkedin: `Write a LinkedIn launch post for: "${S.idea.name}". Hook, problem, solution, social proof, CTA in comments.`,
        email: `Write a launch email for: "${S.idea.name}". Subject (2 variants), preview text, full body with hook/story/offer/CTA, PS line.`,
      };

      const copy = await askClaude(COPY_PROMPTS[type]||COPY_PROMPTS.reddit, "You are an elite direct-response copywriter.");
      S.scriptOuts[type] = copy;
      S.scriptLoading[type] = false;
      render();
    });
  });

  // Copy buttons (scripts tab)
  document.querySelector(".copy-static-scripts")?.addEventListener("click",()=>S.idea&&navigator.clipboard.writeText(S.idea.scripts));
  document.querySelector(".copy-static-scale")?.addEventListener("click",()=>S.idea&&navigator.clipboard.writeText(S.idea.scale));
  document.querySelectorAll(".copy-ai-output").forEach(b=>{
    b.addEventListener("click",()=>navigator.clipboard.writeText(decodeURIComponent(b.dataset.text)));
  });
  document.querySelectorAll(".regen-script").forEach(b=>{
    b.addEventListener("click",()=>{
      const type=b.dataset.type;
      S.scriptOuts[type]=null;
      setState({scriptActive:type});
      setTimeout(()=>document.querySelector(`.script-type-btn[data-type="${type}"]`)?.click(),100);
    });
  });

  // Notes
  document.getElementById("notes-area")?.addEventListener("input",e=>{
    S.notes=e.target.value;
    S.notesSaved=false;
    clearTimeout(notesTimer);
    notesTimer=setTimeout(async()=>{
      await gasPost({action:"saveNotes",notes:S.notes});
      S.notesSaved=true;
      const ind=document.querySelector("#notes-area")?.closest(".content")?.querySelector("p span");
      if(ind){ind.style.color="#34D399";ind.textContent="✓ Auto-saved";}
    },60000);
  });
  document.getElementById("copy-notes")?.addEventListener("click",()=>navigator.clipboard.writeText(S.notes));

  // Modal
  if(S.modalOpen){
    bindModalEvents();
  }
}

// ── INIT ──────────────────────────────────────────
render();
</script>
</body>
</html>
